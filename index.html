<!-- Service Worker registration -->
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(reg => { window.__swReg = reg; })
      .catch(err => console.warn('SW register failed:', err));
  });
}
// Capture install prompt for later use
window.__deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  window.__deferredInstallPrompt = e;
  window.dispatchEvent(new CustomEvent('tn:installprompt-ready'));
});
window.addEventListener('appinstalled', () => {
  window.__deferredInstallPrompt = null;
  window.dispatchEvent(new CustomEvent('tn:installed'));
});
</script>
<style>
:root{
  /* Brand colors — taring naga design system (unchanged tokens) */
  --maroon:#5a0f1a;
  --maroon-deep:#3d0810;
  --maroon-light:#7a1a26;
  --cotton:#f5efe6;
  --cotton-deep:#ebe3d4;
  --cotton-darker:#dfd5c2;
  --gold:#c9a961;
  --gold-soft:#b8965a;
  --black:#0a0606;
  --line:rgba(245,239,230,.15);
  --line-dark:rgba(10,6,6,.10);
  --line-dark-2:rgba(10,6,6,.18);

  /* COTTON-DOMINANT THEME — light body, maroon sidebar */
  --bg:var(--cotton);
  --bg-2:var(--cotton-deep);
  --bg-3:var(--cotton-darker);
  --surface:rgba(10,6,6,.025);
  --surface-2:rgba(10,6,6,.05);
  --surface-hover:rgba(90,15,26,.06);
  --text:var(--black);
  --text-2:#3d2d20;
  --text-3:#7a6a55;
  --border:var(--line-dark);
  --border-2:var(--line-dark-2);
  --accent:var(--maroon);
  --accent-2:var(--maroon-light);

  /* Semantic (adjusted for light bg) */
  --ok:#5e8a4e;
  --warn:#a87726;
  --danger:#a13e2c;

  /* Layout tokens */
  --page-x:clamp(20px, 5vw, 56px);
  --section-y:clamp(48px, 7vh, 80px);
  --max-content:1280px;
  --nav-h:80px;

  /* Fonts */
  --display:'Cormorant Garamond', Georgia, serif;
  --serif:'Cormorant Garamond', Georgia, serif;
  --sans:'Inter', system-ui, -apple-system, sans-serif;
  --mono:'JetBrains Mono', ui-monospace, monospace;
}
@media (max-width:768px){ :root{ --nav-h:64px; } }

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%}
html{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden}
body{margin:0;background:var(--bg);font-weight:400;line-height:1.6;letter-spacing:.005em;overflow:hidden;color:var(--text)}

::selection{background:var(--gold);color:var(--maroon-deep)}

/* Typography */
h1,h2,h3,h4{font-family:var(--display);font-weight:400;letter-spacing:-.005em;line-height:1.15;margin:0;color:var(--text)}
em,i{font-family:var(--serif);font-style:italic;color:var(--accent);font-weight:500}
.serif{font-family:var(--serif)}
.italic{font-family:var(--serif);font-style:italic;color:var(--accent)}
.mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600}
.label{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600}

/* Scrollbar */
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(10,6,6,.18);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(10,6,6,.3)}
/* Login scroll: more subtle */
.tn-login-scroll::-webkit-scrollbar{width:6px}
.tn-login-scroll::-webkit-scrollbar-thumb{background:rgba(10,6,6,.10)}

/* App shell */
.app{display:grid;grid-template-columns:260px 1fr;height:100%;position:relative}
/* Sidebar tetap MAROON sebagai aksen editorial (newspaper masthead) */
.sidebar{
  background:var(--maroon-deep);
  color:var(--cotton);
  border-right:1px solid var(--maroon-light);
  display:flex;flex-direction:column;
  padding:28px 22px 24px;
  overflow-y:auto;
  gap:2px;
}
.sidebar ::-webkit-scrollbar-thumb{background:rgba(245,239,230,.18)}
.brand{display:flex;gap:14px;align-items:center;padding:0 4px 24px;margin-bottom:18px;border-bottom:1px solid rgba(245,239,230,.15)}
.brand-mark{flex:none;display:grid;place-items:center}
.brand-name{font-family:var(--display);font-size:24px;font-weight:400;line-height:1;color:var(--cotton);letter-spacing:-.01em}
.brand-sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);margin-top:6px;font-weight:500}

.nav-section{font-family:var(--mono);font-size:9.5px;letter-spacing:.28em;text-transform:uppercase;color:var(--gold);padding:18px 6px 8px;font-weight:500;opacity:.75}
.nav-item{
  display:flex;align-items:center;gap:14px;
  padding:11px 12px;border-radius:2px;
  color:var(--cotton);opacity:.65;
  cursor:pointer;font-size:14px;font-weight:400;
  border-left:2px solid transparent;
  transition:opacity .3s cubic-bezier(0.16,1,0.3,1), color .3s, border-color .3s, background .3s;
}
.nav-item:hover{opacity:1;background:rgba(245,239,230,.04)}
.nav-item.active{opacity:1;color:var(--cotton);border-left-color:var(--gold);background:rgba(245,239,230,.05)}
.nav-item .ico{width:18px;height:18px;color:currentColor;flex:none;opacity:.85}
.nav-item.active .ico{color:var(--gold);opacity:1}
.nav-item .badge{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--gold);font-weight:600}

.main{display:flex;flex-direction:column;overflow:hidden;background:var(--bg);position:relative;color:var(--text)}
.topbar{
  height:var(--nav-h);flex:none;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 var(--page-x);gap:18px;
  background:var(--bg);color:var(--text);
}
.topbar .crumbs{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.22em;text-transform:uppercase;margin-bottom:4px;font-weight:600}
.topbar h1{font-size:clamp(22px, 2.5vw, 30px);color:var(--text);font-weight:500}
.topbar-spacer{flex:1}
.chip{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 14px;border-radius:999px;border:1px solid var(--border-2);
  font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;
  color:var(--text-2);background:transparent;font-weight:500;
}
.chip .dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}

.content{flex:1;overflow-y:auto;padding:var(--section-y) var(--page-x);scroll-behavior:smooth;background:var(--bg);color:var(--text)}
.content-inner{max-width:var(--max-content);margin:0 auto}

/* Cards — flat editorial on cotton */
.card{
  background:var(--bg-2);
  border:1px solid var(--border);
  border-radius:2px;
  padding:28px;
  color:var(--text);
}
.card-h{margin-bottom:22px}
.card-h h3{font-size:clamp(22px, 2.4vw, 30px);color:var(--text);font-weight:500;margin-top:6px}
.card-h .eyebrow{display:block}

/* Section divider line + mark */
.sec-mark{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.sec-mark .line{flex:1;height:1px;background:var(--border)}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:11px 22px;border-radius:0;
  border:1px solid var(--border-2);background:transparent;
  color:var(--text);cursor:pointer;
  font-family:var(--mono);font-size:11px;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;
  transition:all .35s cubic-bezier(0.16,1,0.3,1);
}
.btn:hover{border-color:var(--accent);color:var(--accent);letter-spacing:.22em}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--cotton)}
.btn.primary:hover{background:var(--maroon-deep);border-color:var(--maroon-deep);color:var(--gold);letter-spacing:.22em}
.btn.gold{background:var(--gold);border-color:var(--gold);color:var(--maroon-deep)}
.btn.gold:hover{background:transparent;color:var(--accent);border-color:var(--accent);letter-spacing:.22em}
.btn.ghost{border-color:transparent;color:var(--text-2)}
.btn.ghost:hover{color:var(--accent);border-color:var(--border)}
.btn.danger{border-color:rgba(161,62,44,.5);color:var(--danger)}
.btn.danger:hover{border-color:var(--danger);background:rgba(161,62,44,.08)}
.btn.sm{padding:7px 14px;font-size:10px;letter-spacing:.16em}
.btn.icon{padding:9px;width:36px;height:36px;justify-content:center}
.btn.icon:hover{letter-spacing:0}

/* Inputs */
.field{display:flex;flex-direction:column;gap:7px}
.field label{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600;opacity:.85}
.input,.select,textarea.input{
  width:100%;
  background:transparent;
  border:none;border-bottom:1px solid var(--border-2);
  border-radius:0;
  padding:9px 0 9px 2px;
  color:var(--text);
  font-family:var(--sans);font-size:14px;font-weight:400;
  outline:none;
  transition:border-color .35s cubic-bezier(0.16,1,0.3,1);
}
.input:focus,.select:focus,textarea.input:focus{border-bottom-color:var(--accent)}
.input::placeholder{color:var(--text-3)}
.input.mono{font-family:var(--mono);font-size:13.5px}
.select{
  appearance:none;cursor:pointer;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%235a0f1a'><path d='M1 3l4 4 4-4z'/></svg>");
  background-repeat:no-repeat;background-position:right 2px center;padding-right:24px;
}
.select option{background:var(--bg);color:var(--text)}
textarea.input{min-height:80px;resize:vertical;border:1px solid var(--border-2);padding:12px;border-radius:0}
textarea.input:focus{border-color:var(--accent)}
.checkbox{display:inline-flex;align-items:center;gap:10px;cursor:pointer;font-size:13.5px;color:var(--text);opacity:.9}
.checkbox input{accent-color:var(--accent);width:15px;height:15px}

/* Stars */
.stars{display:inline-flex;gap:5px;cursor:pointer}
.stars .star{width:18px;height:18px;transition:transform .25s cubic-bezier(0.16,1,0.3,1);color:rgba(10,6,6,.18)}
.stars .star.on{color:var(--gold)}
.stars .star:hover{transform:scale(1.1)}
.stars.lg .star{width:24px;height:24px}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:13.5px;color:var(--text)}
.tbl th{
  text-align:left;
  font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--accent);font-weight:600;
  padding:14px 14px;
  border-bottom:1px solid var(--border-2);
  background:var(--bg);
  position:sticky;top:0;z-index:1;
}
.tbl td{padding:16px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;font-weight:400}
.tbl tr:hover td{background:var(--surface)}
.tbl tr.clickable{cursor:pointer}
.tbl tr.clickable:hover td{color:var(--text)}

/* Pills */
.pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:3px 11px;border-radius:999px;
  font-family:var(--mono);font-size:9.5px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;
  border:1px solid var(--border-2);
  background:transparent;
  color:var(--text-2);
}
.pill.gold{color:#7a5d1c;border-color:rgba(184,150,90,.5);background:rgba(201,169,97,.12)}
.pill.warn{color:var(--warn);border-color:rgba(168,119,38,.45);background:rgba(168,119,38,.07)}
.pill.ok{color:var(--ok);border-color:rgba(94,138,78,.45);background:rgba(94,138,78,.07)}
.pill.crimson, .pill.maroon{color:var(--accent);border-color:rgba(90,15,26,.3);background:rgba(90,15,26,.05)}

.roast-pill{
  display:inline-flex;align-items:center;gap:7px;
  padding:3px 12px 3px 9px;border-radius:999px;
  font-family:var(--mono);font-size:9.5px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;
  border:1px solid var(--border-2);
  background:rgba(10,6,6,.03);
  color:var(--text-2);
}
.roast-pill::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--bg,#c9a961)}

/* KPI — large editorial numbers */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.kpi{
  background:var(--bg-2);
  padding:30px 28px;
  display:flex;flex-direction:column;gap:10px;
}
.kpi .lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600}
.kpi .val{font-family:var(--display);font-size:clamp(34px, 4.5vw, 52px);color:var(--text);font-weight:500;line-height:1;letter-spacing:-.01em}
.kpi .sub{font-size:12px;color:var(--text-3);font-weight:400;line-height:1.5}

.progress{height:2px;background:var(--border);overflow:hidden;margin-top:6px}
.progress > div{height:100%;background:var(--accent);transition:width .8s cubic-bezier(0.16,1,0.3,1)}

/* Hero quote */
.hero-quote{
  font-family:var(--serif);font-style:italic;
  font-size:clamp(20px, 2vw, 26px);
  color:var(--accent);line-height:1.4;
  font-weight:400;
  margin:8px 0;
}

/* Modal */
.modal-back{
  position:fixed;inset:0;background:rgba(10,6,6,.55);backdrop-filter:blur(8px);
  z-index:60;
  display:flex;align-items:center;justify-content:center;
  padding:clamp(8px, 3vw, 24px);
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  animation:fade .3s ease;
}
.modal{
  background:var(--bg);
  color:var(--text);
  border:1px solid var(--border-2);
  border-radius:2px;
  max-width:920px;width:100%;
  max-height:calc(100vh - clamp(16px, 6vw, 48px));
  overflow:auto;
  box-shadow:0 30px 80px -20px rgba(0,0,0,.4);
  margin:auto;
}
.modal-h{display:flex;align-items:center;padding:24px 32px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:2}
.modal-h h2{font-size:clamp(22px, 2.4vw, 30px);color:var(--text);font-weight:500}
.modal-h .close{margin-left:auto;cursor:pointer;color:var(--text-2);opacity:.7;padding:8px;transition:opacity .3s, color .3s}
.modal-h .close:hover{opacity:1;color:var(--accent)}
.modal-b{padding:28px 32px}
.modal-f{padding:18px 32px;border-top:1px solid var(--border);display:flex;gap:12px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg)}

/* Toast */
.toasts{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:10px;z-index:80;pointer-events:none}
.toast{
  background:var(--maroon-deep);
  border:1px solid var(--maroon-light);
  border-left:3px solid var(--gold);
  border-radius:2px;
  padding:14px 20px;
  color:var(--cotton);
  font-size:13px;font-weight:400;
  min-width:280px;
  animation:slideUp .4s cubic-bezier(0.16,1,0.3,1);
  pointer-events:auto;
  box-shadow:0 10px 30px -10px rgba(0,0,0,.35);
}
.toast.ok{border-left-color:var(--gold)}
.toast.err{border-left-color:var(--danger)}
.toast.warn{border-left-color:var(--warn)}
@keyframes slideUp{from{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fade{from{opacity:0}to{opacity:1}}

/* Curve chart */
.curve-wrap{
  background:var(--bg-2);
  border:1px solid var(--border-2);
  border-radius:2px;
  padding:20px;
}
.curve-wrap canvas{display:block}

/* POS layout — desktop: side cart; mobile: FAB + bottom-sheet */
.pos-grid{display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:flex-start;position:relative}
.pos-cart{
  background:var(--bg-2);
  border:1px solid var(--border-2);
  border-radius:2px;
  display:flex;flex-direction:column;overflow:hidden;
  position:sticky;top:0;max-height:calc(100vh - 180px);
  color:var(--text);
}
.pos-cart-h{padding:20px 22px;border-bottom:1px solid var(--border);cursor:pointer}
.pos-cart-items{flex:1;overflow-y:auto;padding:10px 18px;min-height:120px}
.pos-cart-foot{padding:20px 22px;border-top:1px solid var(--border);background:var(--bg-3)}

.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1px;background:var(--border);border:1px solid var(--border)}
.menu-tile{
  background:var(--bg-2);
  padding:20px;cursor:pointer;
  transition:background .4s cubic-bezier(0.16,1,0.3,1), transform .4s cubic-bezier(0.16,1,0.3,1);
  position:relative;
  color:var(--text);
}
.menu-tile:hover{background:rgba(90,15,26,.06)}
.menu-tile .name{font-family:var(--display);font-size:21px;color:var(--text);line-height:1.2;margin:8px 0 6px;font-weight:500}
.menu-tile .price{font-family:var(--mono);font-size:13px;color:var(--accent);font-weight:600;margin-top:12px;letter-spacing:.04em}
.menu-tile .meta{font-family:var(--mono);font-size:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.18em;font-weight:600;opacity:.85}

/* Cart row */
.cart-row{display:grid;grid-template-columns:1fr auto;gap:8px;padding:14px 0;border-bottom:1px solid var(--border)}
.cart-row:last-child{border-bottom:none}
.qty{display:inline-flex;align-items:center;border:1px solid var(--border-2);background:var(--bg)}
.qty button{width:30px;height:30px;background:transparent;border:none;color:var(--text);cursor:pointer;font-size:15px;font-family:var(--sans);transition:color .25s}
.qty button:hover{color:var(--accent)}
.qty span{width:34px;text-align:center;font-family:var(--mono);font-size:12.5px;color:var(--text)}

/* Floating cart action button (mobile) */
.cart-fab{
  position:fixed;bottom:80px;right:18px;z-index:55;
  display:none;align-items:center;gap:10px;
  padding:14px 22px;border-radius:999px;
  background:var(--accent);color:var(--cotton);border:1px solid var(--maroon-deep);
  cursor:pointer;
  font-family:var(--mono);font-size:11.5px;font-weight:600;
  letter-spacing:.16em;text-transform:uppercase;
  box-shadow:0 14px 30px -10px rgba(90,15,26,.45);
  transition:transform .35s cubic-bezier(0.16,1,0.3,1), box-shadow .35s;
}
.cart-fab:hover{transform:translateY(-2px);box-shadow:0 18px 36px -10px rgba(90,15,26,.55)}
.cart-fab .badge{
  background:var(--gold);color:var(--maroon-deep);
  border-radius:999px;padding:2px 9px;font-size:11px;font-weight:700;letter-spacing:.04em;
}

/* Receipt — paper feel (unchanged base, slight refinement) */
.receipt{
  background:#fbf6ec;color:var(--black);
  font-family:var(--mono);font-size:11.5px;
  padding:24px 18px;border-radius:0;
  max-width:320px;margin:0 auto;line-height:1.7;
  border:1px solid var(--border-2);
}
.receipt h4{font-family:var(--display);text-align:center;margin:0 0 4px;font-size:22px;color:var(--maroon-deep);font-weight:500}
.receipt .rcpt-sub{text-align:center;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--maroon);margin-bottom:12px;font-weight:600}
.receipt .rcpt-div{border-top:1px dashed rgba(10,6,6,.3);margin:10px 0}
.receipt .rcpt-row{display:flex;justify-content:space-between;gap:10px}
.receipt .rcpt-row.tot{font-weight:600;font-size:13px;color:var(--maroon-deep)}

/* Mobile nav — light theme */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border-2);padding:6px 4px env(safe-area-inset-bottom);z-index:50;justify-content:space-around;box-shadow:0 -8px 20px -10px rgba(0,0,0,.08)}
.mobile-nav .nav-item{flex-direction:column;gap:4px;padding:10px 8px;font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;border:none;border-radius:0;opacity:.55;color:var(--text-2)}
.mobile-nav .nav-item.active{opacity:1;color:var(--accent);border:none;background:transparent}
.mobile-nav .nav-item.active .ico{color:var(--accent)}
.mobile-nav .nav-item .ico{width:20px;height:20px;color:var(--text-2)}

/* === RESPONSIVE === */

/* Tablet: 881–1100px → narrow sidebar rail (icon-only, expands on hover/click) */
@media (min-width:881px) and (max-width:1100px){
  .app{grid-template-columns:72px 1fr}
  .sidebar{padding:22px 10px 16px;transition:width .3s cubic-bezier(0.16,1,0.3,1);width:72px}
  /* Only expand on hover for hover-capable devices */
  @media (hover:hover){
    .sidebar:hover{width:240px;position:absolute;top:0;bottom:0;left:0;z-index:40;box-shadow:8px 0 24px -10px rgba(0,0,0,.35)}
  }
  .brand{justify-content:center;padding:0 0 18px}
  .brand > div:not(.brand-mark){display:none}
  .sidebar:hover .brand{justify-content:flex-start;padding:0 4px 18px}
  .sidebar:hover .brand > div:not(.brand-mark){display:block}
  .nav-section{font-size:0;padding:14px 0 4px;text-align:center}
  .nav-section::before{content:"·";font-size:18px;color:var(--gold);opacity:.4}
  .sidebar:hover .nav-section{font-size:9.5px;text-align:left;padding:14px 6px 6px}
  .sidebar:hover .nav-section::before{display:none}
  .nav-item{justify-content:center;padding:11px 8px;font-size:0;border-left-width:0;border-radius:6px}
  .nav-item .ico{width:20px;height:20px}
  .sidebar:hover .nav-item{justify-content:flex-start;padding:11px 12px;font-size:14px;border-radius:2px;border-left-width:2px}
  .nav-item .badge{display:none}
  .sidebar:hover .nav-item .badge{display:inline-block}
  .sidebar > div:last-child{font-size:0}
  .sidebar:hover > div:last-child{font-size:initial}
  .sidebar:hover > div:last-child .hero-quote,
  .sidebar:hover > div:last-child .label,
  .sidebar:hover > div:last-child .row{display:initial}
  .sidebar > div:last-child .hero-quote,
  .sidebar > div:last-child .label,
  .sidebar > div:last-child .row{display:none}
  .topbar{padding:0 20px;height:68px}
  .content{padding:36px 20px 40px}
  .pos-grid{grid-template-columns:1fr 320px;gap:18px}
  .modal{max-width:88vw}
}

/* Mobile: ≤880px */
@media (max-width: 880px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}
  .sidebar{display:none}
  .mobile-nav{display:flex !important}
  .topbar{padding:0 14px;height:60px;gap:10px}
  .topbar h1{font-size:18px}
  .topbar .crumbs{font-size:9px}
  .content{padding:24px 14px 96px}
  .chip{padding:5px 10px;font-size:9.5px}
  .chip:not(:first-of-type){display:none}  /* hide secondary chips on mobile */
  .topbar .chip:last-of-type{display:inline-flex}
  .pos-grid{grid-template-columns:1fr;gap:0}
  /* Sembunyikan side cart, ganti dengan FAB + bottom sheet */
  .pos-cart{
    position:fixed;left:0;right:0;bottom:0;top:auto;
    border-radius:18px 18px 0 0;
    max-height:90vh;height:auto;
    z-index:60;
    transform:translateY(100%);
    transition:transform .45s cubic-bezier(0.16,1,0.3,1);
    box-shadow:0 -16px 40px -10px rgba(0,0,0,.25);
    border-color:var(--border-2);
  }
  .pos-cart.open{transform:translateY(0)}
  .pos-cart-h{padding:24px 18px 14px;position:relative}
  .pos-cart-h::before{content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);width:38px;height:3px;background:var(--border-2);border-radius:2px}
  .cart-fab{display:inline-flex}
  .card{padding:20px 16px}
  .modal{max-width:100vw;max-height:96vh;border-radius:0}
  .modal-h{padding:18px 18px}
  .modal-h h2{font-size:18px}
  .modal-b{padding:18px}
  .modal-f{padding:14px 18px;flex-wrap:wrap}
  .modal-f .btn{flex:1;justify-content:center;min-width:120px}
  /* Cart backdrop */
  .cart-backdrop{
    display:none;position:fixed;inset:0;background:rgba(10,6,6,.4);
    backdrop-filter:blur(2px);z-index:59;animation:fade .3s ease;
  }
  .cart-backdrop.show{display:block}
  /* Touch target min */
  .btn{min-height:42px}
  .btn.sm{min-height:32px;padding:6px 12px}
  .btn.icon{min-height:36px;min-width:36px}
  .input,.select{font-size:16px;padding:11px 0 11px 2px}  /* 16px prevents iOS zoom */
  textarea.input{font-size:14px}
  /* Tables: more compact, allow horizontal scroll */
  .tbl{font-size:12.5px;min-width:600px}
  .tbl th{padding:10px 10px;font-size:9px}
  .tbl td{padding:11px 10px}
  /* Section titles smaller */
  .sec-mark{margin-bottom:10px}
  /* KPI grid tighter */
  .kpis{grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
  .kpi{padding:20px 18px}
  .kpi .val{font-size:clamp(26px, 6vw, 36px)}
  /* Tabs horizontal scroll if many */
  .tabs{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .tab{flex:none;padding:12px 16px;font-size:10px;letter-spacing:.18em}
  /* Receipt fits screen */
  .receipt{max-width:100%;font-size:12px}
  /* Menu tile compact */
  .menu-tile{padding:16px 14px}
  .menu-tile .name{font-size:18px}
  /* Grid 4 → 2 on mobile */
  .grid-4{grid-template-columns:1fr 1fr;gap:12px}
  .grid-3{gap:14px}
  /* Toast smaller */
  .toasts{right:14px;left:14px;bottom:90px}
  .toast{min-width:0;width:100%}
  /* Reveal animations less aggressive on mobile */
  .reveal{transform:translateY(10px)}
  /* Settlement compact */
  .hero-quote{font-size:16px}
}

/* Small mobile: ≤480px */
@media (max-width: 480px){
  .content{padding:20px 12px 96px}
  .card{padding:18px 14px}
  .grid-2{grid-template-columns:1fr !important}
  .grid-3,.grid-4{grid-template-columns:1fr !important}
  .menu-grid{grid-template-columns:1fr 1fr}
  .menu-tile{padding:14px 12px}
  .menu-tile .name{font-size:16px}
  .topbar h1{font-size:16px}
  .topbar .chip{display:none}
  .topbar .chip:last-of-type{display:inline-flex}
  .mobile-nav .nav-item{padding:8px 4px;font-size:8.5px}
  .kpis{grid-template-columns:1fr 1fr}
  .kpi .val{font-size:26px}
  h2{font-size:clamp(26px, 7vw, 36px) !important}
  h3{font-size:clamp(20px, 5vw, 28px) !important}
}

/* Print receipts only */
@media print {
  .modal-back{position:static;background:transparent;padding:0;backdrop-filter:none}
  .modal{border:none;max-width:none;max-height:none;box-shadow:none}
  .modal-h,.modal-f{display:none}
  .modal-b{padding:0}
}

/* Utility */
.row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.col{display:flex;flex-direction:column;gap:14px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
@media (max-width:768px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr;gap:16px}}
.gap-sm{gap:8px}.gap-md{gap:16px}.gap-lg{gap:32px;}.gap-xl{gap:48px}
.mt-sm{margin-top:8px}.mt-md{margin-top:16px}.mt-lg{margin-top:28px}.mt-xl{margin-top:44px}
.mb-sm{margin-bottom:8px}.mb-md{margin-bottom:16px}.mb-lg{margin-bottom:28px}
.muted{color:var(--text-3)}
.dim{color:var(--text-2)}
.bright{color:var(--text)}
.tiny{font-size:11.5px}
.text-gold{color:#7a5d1c}
.text-accent{color:var(--accent)}
.fade-in{animation:fadeUp .5s cubic-bezier(0.16,1,0.3,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Tabs */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{
  font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  padding:14px 22px;cursor:pointer;
  color:var(--text-2);opacity:.7;font-weight:600;
  border-bottom:1px solid transparent;
  transition:opacity .35s cubic-bezier(0.16,1,0.3,1), border-color .35s, color .35s;
  margin-bottom:-1px;
}
.tab:hover{opacity:1;color:var(--accent)}
.tab.active{opacity:1;color:var(--accent);border-bottom-color:var(--accent)}

/* Print */
@media print{
  body{background:#fff;color:#000}
  .sidebar,.topbar,.mobile-nav,.no-print{display:none !important}
  .content{padding:0;overflow:visible}
  .main{height:auto}
  .app{display:block;height:auto}
  .receipt{margin:0;max-width:none}
}

/* ============================================================
   MODERN MOTION — cursor accent, reveal, lifts, sheen
   ============================================================ */

/* Cursor accent — subtle maroon halo following pointer */
.cursor-glow{
  position:fixed;left:0;top:0;
  width:520px;height:520px;
  background:radial-gradient(circle, rgba(90,15,26,.05), rgba(90,15,26,.02) 40%, transparent 70%);
  pointer-events:none;z-index:0;
  transform:translate(-50%,-50%);
  opacity:0;
  transition:opacity .8s cubic-bezier(0.16,1,0.3,1);
  mix-blend-mode:multiply;
  will-change:transform;
}
@media (max-width:768px){.cursor-glow{display:none}}

/* Scroll reveal — opacity + slight rise */
.reveal{opacity:0;transform:translateY(20px);transition:opacity 1s cubic-bezier(0.16,1,0.3,1), transform 1s cubic-bezier(0.16,1,0.3,1)}
.reveal.in{opacity:1;transform:none}
.reveal[data-d="1"]{transition-delay:.08s}
.reveal[data-d="2"]{transition-delay:.16s}
.reveal[data-d="3"]{transition-delay:.24s}
.reveal[data-d="4"]{transition-delay:.32s}
.reveal[data-d="5"]{transition-delay:.40s}

/* Page entry */
.fade-in{animation:pageEnter .65s cubic-bezier(0.16,1,0.3,1)}
@keyframes pageEnter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* Modal scale + fade entry */
.modal{animation:modalIn .55s cubic-bezier(0.16,1,0.3,1)}
.modal-back{animation:backIn .35s cubic-bezier(0.16,1,0.3,1)}
@keyframes modalIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}
@keyframes backIn{from{opacity:0;backdrop-filter:blur(0)}to{opacity:1}}

/* KPI sheen sweep on hover */
.kpi{position:relative;overflow:hidden;transition:transform .55s cubic-bezier(0.16,1,0.3,1)}
.kpi::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(110deg, transparent 30%, rgba(201,169,97,.08) 50%, transparent 70%);
  transform:translateX(-100%);
  transition:transform 1.1s cubic-bezier(0.16,1,0.3,1);
  pointer-events:none;
}
.kpi:hover::after{transform:translateX(100%)}
.kpi:hover{transform:translateY(-2px)}
.kpi .val{font-variant-numeric:tabular-nums}

/* Card hover lift */
.lift{transition:transform .5s cubic-bezier(0.16,1,0.3,1), border-color .5s}
.lift:hover{transform:translateY(-3px);border-color:rgba(201,169,97,.32)}

/* Menu tile — modern lift + gold underline */
.menu-tile{transition:background .45s cubic-bezier(0.16,1,0.3,1), transform .45s cubic-bezier(0.16,1,0.3,1)}
.menu-tile::after{
  content:"";position:absolute;left:22px;right:22px;bottom:18px;height:1px;
  background:var(--gold);transform:scaleX(0);transform-origin:left;
  transition:transform .55s cubic-bezier(0.16,1,0.3,1);
}
.menu-tile:hover{transform:translateY(-3px)}
.menu-tile:hover::after{transform:scaleX(1)}

/* Tab — sliding underline */
.tabs{position:relative}
.tab{position:relative}
.tab::after{
  content:"";position:absolute;left:0;right:0;bottom:-1px;height:1px;background:var(--gold);
  transform:scaleX(0);transform-origin:center;
  transition:transform .45s cubic-bezier(0.16,1,0.3,1);
}
.tab.active::after{transform:scaleX(1)}
.tab:hover::after{transform:scaleX(.3)}

/* Nav-item — magnetic gold tick */
.nav-item{position:relative}
.nav-item::after{
  content:"";position:absolute;left:0;top:50%;width:0;height:1px;background:var(--gold);
  transform:translateY(-50%);transition:width .45s cubic-bezier(0.16,1,0.3,1);
}
.nav-item:hover::after{width:14px}
.nav-item.active::after{width:0}

/* Brand mark — gentle tilt on hover */
.brand-mark{transition:transform .7s cubic-bezier(0.16,1,0.3,1)}
.brand:hover .brand-mark{transform:rotate(-6deg)}

/* Stars — rotate subtly on select */
.stars .star{transition:transform .35s cubic-bezier(0.16,1,0.3,1), color .35s}
.stars .star.on{animation:starPop .45s cubic-bezier(0.16,1,0.3,1)}
@keyframes starPop{0%{transform:scale(.6) rotate(-12deg)}60%{transform:scale(1.15) rotate(6deg)}100%{transform:scale(1) rotate(0)}}

/* Progress fill */
.progress > div{transition:width 1.1s cubic-bezier(0.16,1,0.3,1)}

/* Toast — slide + slight scale */
.toast{animation:toastIn .55s cubic-bezier(0.16,1,0.3,1)}
@keyframes toastIn{from{transform:translateX(20px) scale(.96);opacity:0}to{transform:none;opacity:1}}

/* Button — gentle glow on primary */
.btn.primary{position:relative}
.btn.primary::before{
  content:"";position:absolute;inset:0;border-radius:inherit;
  box-shadow:0 0 0 1px rgba(201,169,97,0);
  transition:box-shadow .5s cubic-bezier(0.16,1,0.3,1);
  pointer-events:none;
}
.btn.primary:hover::before{box-shadow:0 0 0 4px rgba(201,169,97,.08)}

/* Table row stagger on first render */
.tbl tbody tr{animation:rowIn .55s cubic-bezier(0.16,1,0.3,1) both}
.tbl tbody tr:nth-child(1){animation-delay:.04s}
.tbl tbody tr:nth-child(2){animation-delay:.08s}
.tbl tbody tr:nth-child(3){animation-delay:.12s}
.tbl tbody tr:nth-child(4){animation-delay:.16s}
.tbl tbody tr:nth-child(5){animation-delay:.20s}
.tbl tbody tr:nth-child(6){animation-delay:.24s}
.tbl tbody tr:nth-child(7){animation-delay:.28s}
.tbl tbody tr:nth-child(8){animation-delay:.32s}
.tbl tbody tr:nth-child(n+9){animation-delay:.36s}
@keyframes rowIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Hero quote — letter spacing breathe */
.hero-quote em{transition:letter-spacing .5s cubic-bezier(0.16,1,0.3,1)}
.hero-quote:hover em{letter-spacing:.02em}

/* Section mark line — animated draw */
.sec-mark .line{transform-origin:left;animation:lineDraw 1.1s cubic-bezier(0.16,1,0.3,1) .15s both}
@keyframes lineDraw{from{transform:scaleX(0)}to{transform:scaleX(1)}}

/* Chip dot pulse */
.chip .dot{animation:dotPulse 2.4s cubic-bezier(0.45,0,0.55,1) infinite}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(90,15,26,.4)}50%{box-shadow:0 0 0 5px rgba(90,15,26,0)}}

/* Cart row enter */
.cart-row{animation:cartRow .45s cubic-bezier(0.16,1,0.3,1)}
@keyframes cartRow{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:none}}

/* Smooth select chevron */
.select{transition:border-bottom-color .4s, background-position .4s}

/* Roast pill hover */
.roast-pill{transition:transform .3s cubic-bezier(0.16,1,0.3,1)}
.roast-pill:hover{transform:translateY(-1px)}

/* Underlined inline link */
.u-link{position:relative;color:var(--gold);text-decoration:none}
.u-link::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:1px;background:var(--gold);transform:scaleX(0);transform-origin:right;transition:transform .45s cubic-bezier(0.16,1,0.3,1)}
.u-link:hover::after{transform:scaleX(1);transform-origin:left}

/* Reduced motion */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms !important;transition-duration:.001ms !important;animation-iteration-count:1 !important}
  .reveal{opacity:1;transform:none}
  .cursor-glow{display:none}
}
</style>

const SYSTEM_ROLES = ['admin','owner','pegawai']; // immutable IDs, but their perms editable
const ALL_PAGES = ['dashboard','roast','inventory','pos','reports','settlement','users','settings'];
const ALL_CAPS = ['canCloseDay','canEditPrice','canEditUsers','canSeeReports','canDeleteAny','canEditSettings','canEditBranding'];

const DEFAULT_PERMS = {
  admin:    { label:'Administrator', system:true, pages:['dashboard','roast','inventory','pos','reports','settlement','users','settings'], canCloseDay:true, canEditPrice:true, canEditUsers:true, canSeeReports:true, canDeleteAny:true, canEditSettings:true, canEditBranding:true },
  owner:    { label:'Pemilik',       system:true, pages:['dashboard','roast','inventory','pos','reports','settlement','settings'],        canCloseDay:true, canEditPrice:true, canEditUsers:false, canSeeReports:true, canDeleteAny:true, canEditSettings:true, canEditBranding:false },
  pegawai:  { label:'Pegawai',       system:true, pages:['dashboard','roast','pos','settlement'],                                          canCloseDay:false, canEditPrice:false, canEditUsers:false, canSeeReports:false, canDeleteAny:false, canEditSettings:false, canEditBranding:false },
};

function getPerms(settings, role){
  const stored = settings?.permissions || {};
  const merged = { ...DEFAULT_PERMS, ...stored };
  return merged[role] || merged.pegawai || DEFAULT_PERMS.pegawai;
}
function getAllRoles(settings){
  const stored = settings?.permissions || {};
  const merged = { ...DEFAULT_PERMS, ...stored };
  return Object.keys(merged);
}

async function hashPassword(pw){
  const enc = new TextEncoder().encode((pw||'') + '|tn.lab.salt|v1');
  const buf = await crypto.subtle.digest('SHA-256', enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function makeUser({ username, displayName, role, passHash, active=true }){
  // Accept any string as role (system + custom); validation done at consumption site via getPerms()
  const safeRole = (typeof role === 'string' && role.length > 0) ? role : 'pegawai';
  return {
    id: 'u'+Date.now()+Math.floor(Math.random()*1000),
    username: (username||'').trim().toLowerCase(),
    displayName: displayName || username,
    role: safeRole,
    passHash,
    active,
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
    lastLogin: null,
  };
}

/* ============================================================
   SETTLEMENT helpers
   ============================================================ */
function todaySettlement(settlements){
  const today = todayISO();
  return settlements.find(s => s.date === today);
}
function isToday(s){ return s && s.date === todayISO(); }
function isPendingOrClosed(s){ return s && (s.status==='pending' || s.status==='closed'); }
function newSettlement(date, openedById, openingCash){
  return {
    id: 's'+Date.now(),
    date, openedAt: new Date().toISOString(), openedBy: openedById,
    closedAt: null, closedBy: null,
    openingCash: +openingCash||0, closingCash: null,
    notes: '',
    status: 'open',
    snapshot: null, // computed at close time
    updatedAt: new Date().toISOString(),
  };
}
function computeSettlementSnapshot(state, dateISO){
  const orders = state.orders.filter(o=>o.date===dateISO);
  const byChannel = {}, byPayment = {}, byProduct = {};
  let totalRevenue = 0, totalQty = 0;
  for(const o of orders){
    totalRevenue += +o.total||0;
    byChannel[o.channel||'-'] = (byChannel[o.channel||'-']||0) + (+o.total||0);
    byPayment[o.paymentMethod||'Cash'] = (byPayment[o.paymentMethod||'Cash']||0) + (+o.total||0);
    for(const it of (o.items||[])){
      totalQty += +it.qty||0;
      byProduct[it.name] = (byProduct[it.name]||0) + ((+it.qty||0)*(+it.price||0));
    }
  }
  return { orderCount: orders.length, totalRevenue, totalQty, byChannel, byPayment, byProduct };
}

/* ============================================================
   WIFI QR helper for receipt
   ============================================================ */
function wifiQRString(ssid, password, enc='WPA'){
  if(!ssid) return '';
  const safe = s => (s||'').replace(/([\\;,"':])/g,'\\$1');
  return `WIFI:S:${safe(ssid)};T:${enc||'WPA'};P:${safe(password)};;`;
}
async function generateQRDataURL(text, size=160){
  if(!text || !window.QRCode) return null;
  try{
    return await QRCode.toDataURL(text, { width:size, margin:1, color:{ dark:'#0a0606', light:'#fbf6ec' }, errorCorrectionLevel:'M' });
  }catch(e){ return null; }
}

/* ============================================================
   EXCEL EXPORT — ExcelJS workbook with charts embedded as PNG
   ============================================================ */
async function renderChartPNG(config, w=1200, h=500){
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  canvas.style.position='fixed'; canvas.style.left='-9999px'; canvas.style.top='-9999px';
  canvas.style.background='#ffffff';
  document.body.appendChild(canvas);
  const cfg = {
    ...config,
    options: {
      ...(config.options||{}),
      animation: false,
      responsive: false,
      maintainAspectRatio: false,
      devicePixelRatio: 2,
    }
  };
  // Force light theme for chart (since we're exporting to white spreadsheet)
  if(cfg.options.scales){
    Object.keys(cfg.options.scales).forEach(k=>{
      const ax = cfg.options.scales[k] = {...(cfg.options.scales[k]||{})};
      ax.ticks = {...(ax.ticks||{}), color:'#3d2d20'};
      ax.grid = {...(ax.grid||{}), color:'rgba(10,6,6,.1)'};
      if(ax.title) ax.title = {...ax.title, color:'#5a0f1a'};
    });
  }
  if(cfg.options.plugins){
    if(cfg.options.plugins.legend && cfg.options.plugins.legend.labels){
      cfg.options.plugins.legend.labels = {...cfg.options.plugins.legend.labels, color:'#0a0606'};
    }
  }
  const c = new Chart(canvas.getContext('2d'), cfg);
  await new Promise(r => requestAnimationFrame(()=> requestAnimationFrame(r)));
  await new Promise(r => setTimeout(r, 100));
  const dataUrl = canvas.toDataURL('image/png');
  c.destroy();
  canvas.remove();
  return dataUrl;
}

async function exportRevenueXLSX(state, range, t, lang){
  const wb = new ExcelJS.Workbook();
  wb.creator = state.settings.businessName || 'Taring Naga Lab';
  wb.created = new Date();
  wb.title = (lang==='en'?'Revenue Report':'Laporan Pendapatan') + ' — ' + (state.settings.businessName||'');

  // === Compute data ===
  const today = new Date();
  const cutoff = new Date(today);
  if(range==='7d') cutoff.setDate(today.getDate()-6);
  else if(range==='30d') cutoff.setDate(today.getDate()-29);
  else if(range==='90d') cutoff.setDate(today.getDate()-89);
  else if(range==='ytd') cutoff.setMonth(0,1);
  else cutoff.setFullYear(2000);

  const inRange = state.orders.filter(o=> new Date(o.date) >= cutoff);
  const totalRev = inRange.reduce((s,o)=>s+o.total,0);
  const count = inRange.length;
  const items = inRange.flatMap(o=>o.items||[]);
  const totalQty = items.reduce((s,i)=>s+(i.qty||0),0);

  const daily = {};
  for(const o of inRange){ daily[o.date] = (daily[o.date]||0) + o.total; }
  const days = Object.keys(daily).sort();

  const perProduct = {}; const qtyPerProduct = {};
  for(const it of items){
    perProduct[it.name] = (perProduct[it.name]||0) + (it.qty||0)*(it.price||0);
    qtyPerProduct[it.name] = (qtyPerProduct[it.name]||0) + (it.qty||0);
  }
  const productRows = Object.entries(perProduct).sort((a,b)=>b[1]-a[1])
    .map(([name,rev])=>({name, qty:qtyPerProduct[name]||0, revenue:rev}));

  const perChannel = {};
  for(const o of inRange){ perChannel[o.channel||'-'] = (perChannel[o.channel||'-']||0) + o.total; }

  const monthly = {};
  for(const o of state.orders){ const m=o.date.slice(0,7); monthly[m] = (monthly[m]||0)+o.total; }
  const monthsKeys = Object.keys(monthly).sort();

  // === Styles ===
  const headerFill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF5A0F1A'} };
  const headerFont = { name:'Inter', bold:true, color:{argb:'FFF5EFE6'}, size:11 };
  const titleFont = { name:'Cormorant Garamond', bold:true, color:{argb:'FF5A0F1A'}, size:22 };
  const subFont = { name:'Inter', color:{argb:'FF7A6A55'}, size:10, italic:true };
  const moneyFmt = '"Rp" #,##0';
  const border = { style:'thin', color:{argb:'FFCFC4AC'} };
  const allBorders = { top:border, left:border, bottom:border, right:border };

  function applyHeader(row){
    row.eachCell(cell => {
      cell.fill = headerFill;
      cell.font = headerFont;
      cell.alignment = { vertical:'middle', horizontal:'left', indent:1 };
      cell.border = allBorders;
    });
    row.height = 24;
  }

  // === Sheet 1: Cover & Summary ===
  const ws1 = wb.addWorksheet(lang==='en'?'Summary':'Ringkasan', { properties:{ tabColor:{argb:'FF5A0F1A'} }, pageSetup:{ paperSize:9, orientation:'portrait', fitToPage:true } });
  ws1.getColumn('A').width = 28;
  ws1.getColumn('B').width = 24;
  ws1.getColumn('C').width = 18;
  ws1.getColumn('D').width = 18;

  ws1.mergeCells('A1:D1');
  ws1.getCell('A1').value = state.settings.businessName || 'Taring Naga Roastery';
  ws1.getCell('A1').font = titleFont;
  ws1.getCell('A1').alignment = { vertical:'middle', horizontal:'left' };
  ws1.getRow(1).height = 36;

  ws1.mergeCells('A2:D2');
  ws1.getCell('A2').value = state.settings.tagline || '';
  ws1.getCell('A2').font = subFont;

  ws1.mergeCells('A3:D3');
  ws1.getCell('A3').value = (lang==='en'?'Revenue Report · ':'Laporan Pendapatan · ') + ({'7d':'7 days','30d':'30 days','90d':'90 days','ytd':'YTD','all':'All time'}[range]||range);
  ws1.getCell('A3').font = { name:'Inter', size:13, color:{argb:'FF3D2D20'}, bold:true };

  ws1.mergeCells('A4:D4');
  ws1.getCell('A4').value = (lang==='en'?'Generated: ':'Dibuat: ') + new Date().toLocaleString(lang==='en'?'en-US':'id-ID');
  ws1.getCell('A4').font = subFont;

  // KPI table
  ws1.addRow([]);
  const kpiHeader = ws1.addRow([lang==='en'?'Key Metrics':'Indikator Utama','','','']);
  ws1.mergeCells(`A${kpiHeader.number}:D${kpiHeader.number}`);
  kpiHeader.getCell(1).fill = headerFill; kpiHeader.getCell(1).font = headerFont; kpiHeader.height = 24;

  const kpiData = [
    [lang==='en'?'Total Revenue':'Total Pendapatan', totalRev, ''],
    [lang==='en'?'Total Orders':'Jumlah Order', count, ''],
    [lang==='en'?'Items Sold':'Item Terjual', totalQty, ''],
    [lang==='en'?'Average Order Value':'Rata-rata Order', count? totalRev/count : 0, ''],
    [lang==='en'?'Monthly Target Progress':'Progress Target Bulanan', monthly[new Date().toISOString().slice(0,7)]||0, (lang==='en'?'of ':'dari ') + (state.settings.monthlyTarget||0)],
    [lang==='en'?'Yearly Target Progress':'Progress Target Tahunan', monthsKeys.filter(m=>m.startsWith(new Date().getFullYear()+'')).reduce((s,m)=>s+monthly[m],0), (lang==='en'?'of ':'dari ') + (state.settings.yearlyTarget||0)],
  ];
  kpiData.forEach((d,i)=>{
    const row = ws1.addRow(d);
    row.getCell(1).font = { name:'Inter', bold:true, color:{argb:'FF3D2D20'} };
    row.getCell(2).numFmt = moneyFmt;
    row.getCell(2).font = { name:'JetBrains Mono', bold:true, color:{argb:'FF5A0F1A'}, size:12 };
    row.getCell(3).font = subFont;
    row.eachCell(c=>{ c.border = allBorders; });
    row.height = 22;
  });

  // === Sheet 2: Daily Revenue + Chart ===
  const ws2 = wb.addWorksheet(lang==='en'?'Daily':'Harian', { properties:{ tabColor:{argb:'FFC9A961'} } });

    { header:lang==='en'?'Date':'Tanggal', key:'date', width:16 },
    { header:lang==='en'?'Revenue':'Pendapatan', key:'rev', width:20, style:{ numFmt: moneyFmt } },
    { header:lang==='en'?'Orders':'Jumlah Order', key:'cnt', width:14 },
  ];
  applyHeader(ws2.getRow(1));
  const dailyCounts = {};
  for(const o of inRange){ dailyCounts[o.date] = (dailyCounts[o.date]||0)+1; }
  for(const d of days){
    const r = ws2.addRow({ date:d, rev:daily[d], cnt:dailyCounts[d]||0 });
    r.getCell(2).font = { name:'JetBrains Mono' };
    r.eachCell(c=> c.border = allBorders);
  }
  // Total row
  const totalRow = ws2.addRow({ date:lang==='en'?'TOTAL':'TOTAL', rev:totalRev, cnt:count });
  totalRow.eachCell(c=>{
    c.font = { name:'Inter', bold:true, color:{argb:'FF5A0F1A'} };
    c.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FFEBE3D4'} };
    c.border = allBorders;
  });
  totalRow.getCell(2).numFmt = moneyFmt;

  // Daily chart PNG
  try{

/* ============================================================
   ESC/POS THERMAL PRINTER (Web Bluetooth)
   ============================================================ */
const ESC = {
  INIT: [0x1B, 0x40],
  ALIGN_L: [0x1B, 0x61, 0x00],
  ALIGN_C: [0x1B, 0x61, 0x01],
  ALIGN_R: [0x1B, 0x61, 0x02],
  BOLD_ON: [0x1B, 0x45, 0x01],
  BOLD_OFF: [0x1B, 0x45, 0x00],
  TXT_NORMAL: [0x1D, 0x21, 0x00],
  TXT_2H:     [0x1D, 0x21, 0x01],
  TXT_2W:     [0x1D, 0x21, 0x10],
  TXT_2WH:    [0x1D, 0x21, 0x11],
  LF: [0x0A],
  CUT: [0x1D, 0x56, 0x00],
  FEED: (n)=>[0x1B, 0x64, n & 0xff],
  CHARSET: [0x1B, 0x52, 0x00],
  CODEPAGE_CP437: [0x1B, 0x74, 0x00],
};

class BluetoothPrinter {
  constructor(){ this.device=null; this.characteristic=null; this.lastName=''; }
  get connected(){ return !!(this.device?.gatt?.connected && this.characteristic); }
  async connect(){
    if(!navigator.bluetooth) throw new Error('Web Bluetooth tidak didukung browser ini. Pakai Chrome/Edge desktop atau Chrome Android.');
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [
        '000018f0-0000-1000-8000-00805f9b34fb',
        '0000ff00-0000-1000-8000-00805f9b34fb',
        '0000ffe0-0000-1000-8000-00805f9b34fb',
        '49535343-fe7d-4ae5-8fa9-9fafd205e455',
        '0000fee7-0000-1000-8000-00805f9b34fb',
        'e7810a71-73ae-499d-8c15-faa9aef0c3f2',
        '6e400001-b5a3-f393-e0a9-e50e24dcca9e',
      ],
    });
    this.device = device;
    this.lastName = device.name || 'Unknown';
    device.addEventListener('gattserverdisconnected', ()=>{ this.characteristic=null; });
    const server = await device.gatt.connect();
    const services = await server.getPrimaryServices();
    let foundChar = null;
    for(const svc of services){
      try{
        const chars = await svc.getCharacteristics();
        for(const c of chars){
          if(c.properties.write || c.properties.writeWithoutResponse){
            foundChar = c; break;
          }
        }
        if(foundChar) break;
      }catch(_){}
    }
    if(!foundChar) throw new Error('Karakteristik tulis tidak ditemukan. Pastikan printer ESC/POS dan dalam pairing mode.');
    this.characteristic = foundChar;
    return { name: this.lastName, id: device.id };
  }
  async disconnect(){ try{ this.device?.gatt?.disconnect(); }catch(_){} this.characteristic=null; this.device=null; }
  async send(bytes){
    if(!this.characteristic) throw new Error('Printer belum terkoneksi.');
    const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes);
    const CHUNK = 100;
    for(let i=0;i<arr.length;i+=CHUNK){
      const slice = arr.subarray(i, Math.min(i+CHUNK, arr.length));
      if(this.characteristic.properties.writeWithoutResponse){
        await this.characteristic.writeValueWithoutResponse(slice);
      } else {
        await this.characteristic.writeValue(slice);
      }
      await new Promise(r=> setTimeout(r, 25));
    }
  }
}

const printerSingleton = new BluetoothPrinter();

function encAscii(s){
  const out = [];
  for(const ch of (s||'')){
    const code = ch.codePointAt(0);
    // Map common typography to ASCII to avoid garbled prints
    const map = {0x2014:'-', 0x2013:'-', 0x2022:'*', 0x2018:"'", 0x2019:"'", 0x201C:'"', 0x201D:'"', 0xA0:' ', 0xB0:'o'};
    if(map[code]!==undefined){ for(const c of map[code]) out.push(c.charCodeAt(0)); continue; }
    out.push(code < 128 ? code : 0x3F);
  }
  return out;
}
function padBetween(left, right, width){
  const space = Math.max(1, width - String(left).length - String(right).length);
  return String(left) + ' '.repeat(space) + String(right);
}
function fmtIDR_short(n){ return 'Rp ' + Math.round(n||0).toLocaleString('id-ID'); }

function buildReceiptBytes(order, settings, width=32){
  const out = [];
  const r = settings.receipt || {};
  const tmpl = r.template || 'classic';
  const minimal = tmpl === 'minimal';
  const push = b => Array.isArray(b) ? out.push(...b) : out.push(b);
  const line = s => { push(encAscii(s)); push(ESC.LF); };
  const sep = () => line('-'.repeat(width));

  push(ESC.INIT); push(ESC.CHARSET); push(ESC.CODEPAGE_CP437);

  // Custom header
  if(r.header && !minimal){
    push(ESC.ALIGN_C);
    for(const l of r.header.split('\n')) line(l);
  }

  push(ESC.ALIGN_C); push(ESC.TXT_2WH); push(ESC.BOLD_ON);
  line((settings.businessName||'').toUpperCase());
  push(ESC.TXT_NORMAL); push(ESC.BOLD_OFF);
  if(!minimal){
    if(r.showTagline!==false && settings.tagline) line(settings.tagline);
    if(r.showAddress!==false && settings.address) line(settings.address);
    if(r.showPhone!==false && settings.phone) line(settings.phone);
    if(r.showTax && r.taxNumber) line('NPWP: '+r.taxNumber);
  }
  sep();
  push(ESC.ALIGN_L);
  line('No.    : ' + (order.id||'').slice(-8).toUpperCase());
  line('Tgl    : ' + (order.date||'') + ' ' + (order.time||''));
  if(!minimal){
    line('Channel: ' + (order.channel||'-'));
    line('Cust   : ' + (order.customer||'-'));
  }
  sep();
  for(const it of (order.items||[])){
    push(ESC.BOLD_ON); line(it.name); push(ESC.BOLD_OFF);
    const l = `${it.qty} x ${fmtIDR_short(it.price)}`;
    const rr = fmtIDR_short(it.subtotal);
    line(padBetween(l, rr, width));
  }
  sep();
  push(ESC.BOLD_ON); push(ESC.TXT_2H);
  line(padBetween('TOTAL', fmtIDR_short(order.total), Math.floor(width/2)));
  push(ESC.TXT_NORMAL); push(ESC.BOLD_OFF);
  line(padBetween('Bayar', fmtIDR_short(order.paid), width));
  line(padBetween('Kembali', fmtIDR_short(Math.max(0,(order.paid||0)-(order.total||0))), width));
  sep();

  // WiFi
  if(r.wifiSSID && !minimal){
    push(ESC.ALIGN_C);
    push(ESC.BOLD_ON); line('FREE WIFI'); push(ESC.BOLD_OFF);
    line('SSID: '+r.wifiSSID);
    if(r.wifiPassword && r.wifiEncryption!=='nopass') line('PW: '+r.wifiPassword);
    sep();
  }

  if(r.socialHandle && !minimal){
    push(ESC.ALIGN_C); line(r.socialHandle);
  }

  // Footer
  push(ESC.ALIGN_C);
  if(r.footer){
    for(const l of r.footer.split('\n')) line(l);
  } else {
    line('Terima kasih');
    line('"Kopi yang baik punya gigi."');
  }
  push(ESC.LF);
  push(ESC.FEED(3));
  push(ESC.CUT);
  return new Uint8Array(out);
}

function buildTestPrintBytes(settings, width=32){
  const out = [];
  const push = b => Array.isArray(b) ? out.push(...b) : out.push(b);
  const line = s => { push(encAscii(s)); push(ESC.LF); };
  push(ESC.INIT); push(ESC.CHARSET); push(ESC.CODEPAGE_CP437);
  push(ESC.ALIGN_C); push(ESC.TXT_2WH); push(ESC.BOLD_ON);
  line((settings.businessName||'').toUpperCase());
  push(ESC.TXT_NORMAL); push(ESC.BOLD_OFF);
  line('Test Print');
  line(new Date().toLocaleString('id-ID'));
  line('-'.repeat(width));
  push(ESC.ALIGN_L);
  line('Bold:'); push(ESC.BOLD_ON); line('  abcdefghij 0123456789'); push(ESC.BOLD_OFF);
  line('Normal:'); line('  abcdefghij 0123456789');
  line('Right aligned:');
  push(ESC.ALIGN_R); line('Rp 1.234.567'); push(ESC.ALIGN_L);
  push(ESC.FEED(3)); push(ESC.CUT);
  return new Uint8Array(out);
}

/* ============================================================
   SYNC SERVICE — Google Apps Script + Sheet backend
   ============================================================ */
const SyncSvc = {
  status: 'idle', // 'idle' | 'syncing' | 'error'
  lastError: '',
  lastSyncAt: null,
  pulledCount: 0,
  listeners: new Set(),
  notify(){ for(const fn of this.listeners) try{ fn(); }catch(_){} },
  on(fn){ this.listeners.add(fn); return ()=> this.listeners.delete(fn); },
  setStatus(s, err){ this.status=s; this.lastError=err||''; this.notify(); },

  async test(endpoint, secret){
    if(!endpoint) throw new Error('Endpoint kosong');
    const url = endpoint + (endpoint.includes('?')?'&':'?') + 'action=health';
    const res = await fetch(url, { method:'GET', redirect:'follow' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  },

  async push(endpoint, secret, localState){
    if(!endpoint || !secret) throw new Error('Endpoint atau secret kosong');
    this.setStatus('syncing');
    try {
      const stamped = stampUpdatedAt(localState);
      const payload = {
        action: 'sync',
        secret,
        data: {
          beans: stamped.beans,
          products: stamped.products,
          roastLogs: stamped.roastLogs,
          cuppings: stamped.cuppings,
          orders: stamped.orders,
          users: (localState.auth?.users||[]).map(u => ({...u, updatedAt: u.updatedAt||new Date().toISOString()})),
          settlements: (localState.settlements||[]).map(s => ({...s, updatedAt: s.updatedAt||new Date().toISOString()})),
          settings: [{ id:'_settings', ...stamped.settings, updatedAt: stamped.settings.updatedAt || new Date().toISOString() }],
        }
      };
      const res = await fetch(endpoint, {
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body: JSON.stringify(payload),
        redirect:'follow',
      });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const result = await res.json();
      if(result.error) throw new Error(result.error);
      this.lastSyncAt = new Date().toISOString();
      this.setStatus('idle');
      return result.merged;
    } catch(err){
      this.setStatus('error', err.message || String(err));
      throw err;
    }
  },

  async pullIncoming(endpoint, secret){
    if(!endpoint || !secret) return [];
    const url = endpoint + (endpoint.includes('?')?'&':'?') + 'action=incoming&secret=' + encodeURIComponent(secret);
    const res = await fetch(url, { method:'GET', redirect:'follow' });
    if(!res.ok) return [];
    const data = await res.json();
    return data.orders || [];
  },

  async markImported(endpoint, secret, ids){
    if(!ids?.length) return;
    await fetch(endpoint, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'mark_imported', secret, ids }),
      redirect:'follow',
    });
  },
};

function stampUpdatedAt(state){
  const now = new Date().toISOString();
  const stamp = arr => (arr||[]).map(it => it.updatedAt ? it : ({...it, updatedAt: now}));
  return {
    beans: stamp(state.beans),
    products: stamp(state.products),
    roastLogs: stamp(state.roastLogs),
    cuppings: stamp(state.cuppings),
    orders: stamp(state.orders),
    settings: state.settings.updatedAt ? state.settings : {...state.settings, updatedAt: now},
  };
}

function mergeStateFromServer(local, merged){
  const out = {};
  for(const key of ['beans','products','roastLogs','cuppings','orders']){
    out[key] = merged[key] || local[key];
  }
  // Users merge with auth wrapper
  if(merged.users){
    out.auth = { ...local.auth, users: merged.users };
  }
  if(merged.settlements){
    out.settlements = merged.settlements;
  }
  // settings is a single object in local but array on server
  if(Array.isArray(merged.settings) && merged.settings.length){
    const srv = merged.settings.find(x=>x.id==='_settings') || merged.settings[0];
    const { id, ...rest } = srv;
    out.settings = { ...local.settings, ...rest };
  } else {
    out.settings = local.settings;
  }
  return out;
}

function genCurve(){
  const pts=[];
  for(let t=0;t<=24;t+=0.5){
    const T1 = t<1? 200 - 110*(1-t) : 90 + (210-90)*(1-Math.exp(-t/8)) - (t>20?5:0);
    const T2 = t<1? 230 : 230 - (230-205)*Math.min(1,t/10) - (t>18?3:0);
    pts.push({ t, T1: +T1.toFixed(1), T2: +T2.toFixed(1) });
  }
  return pts;
}

  load(){

      if(s){
        const parsed = JSON.parse(s);
        const def = defaultStore();
        // Merge with defaults to fill missing keys (forward-compat)
        const merged = {
          ...def,
          ...parsed,
          settings: { ...def.settings, ...(parsed.settings||{}),
            theme: { ...def.settings.theme, ...((parsed.settings||{}).theme||{}) },
            receipt: { ...def.settings.receipt, ...((parsed.settings||{}).receipt||{}) },
            settlement: { ...def.settings.settlement, ...((parsed.settings||{}).settlement||{}) },
            permissions: { ...def.settings.permissions, ...((parsed.settings||{}).permissions||{}) },
            brand: { ...def.settings.brand, ...((parsed.settings||{}).brand||{}) },
          },
          auth: { ...def.auth, ...(parsed.auth||{}) },
          beans: Array.isArray(parsed.beans) ? parsed.beans : def.beans,
          products: Array.isArray(parsed.products) ? parsed.products : def.products,
          roastLogs: Array.isArray(parsed.roastLogs) ? parsed.roastLogs : def.roastLogs,
          cuppings: Array.isArray(parsed.cuppings) ? parsed.cuppings : def.cuppings,
          orders: Array.isArray(parsed.orders) ? parsed.orders : def.orders,
          settlements: Array.isArray(parsed.settlements) ? parsed.settlements : def.settlements,
          movements: Array.isArray(parsed.movements) ? parsed.movements : def.movements,
        };
        // Sanity guard: ensure auth.users is array; current user has valid role
        if(!Array.isArray(merged.auth.users)) merged.auth.users = [];
        const validRoles = Object.keys(merged.settings.permissions||{});
        merged.auth.users = merged.auth.users.map(u => {
          if(!u || typeof u !== 'object') return null;
          // If user has role not in permissions, fall back to 'pegawai'
          const safeRole = validRoles.includes(u.role) ? u.role : 'pegawai';
          return { ...u, role: safeRole };
        }).filter(Boolean);
        return merged;
      }
    }catch(e){
      console.warn('[TN Lab] Store.load failed, using defaults:', e);
    }
    return defaultStore();
  },
  save(state){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
    catch(e){ console.warn('[TN Lab] Store.save failed:', e); }
  }
};

function computePricing(bean, weight, settings, markupPct){
  const susut = bean?.susut ?? settings.susutDefault;
  const hargaBeli = bean?.hargaBeli ?? 0;
  const totalCostPerKg = hargaBeli * (1 + susut);
  const beanCost = totalCostPerKg * (weight/1000);
  const hpp = beanCost + settings.packagingCost + settings.stickerCost + settings.roastingFee;
  const baseSell = hpp * (1 + (markupPct ?? settings.markupPct)/100);
  const roundUp = Math.ceil(baseSell/5000)*5000;
  return { totalCostPerKg, beanCost, hpp, baseSell, roundUp };
}

/* ============================================================
   MOTION HOOKS — count-up, reveal, cursor glow
   ============================================================ */
const prefersReducedMotion = () => typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function useCountUp(target, dur=900){
  const [val, setVal] = useState(target);
  const prev = useRef(target);
  useEffect(()=>{
    if(prefersReducedMotion()){ setVal(target); prev.current=target; return; }
    const from = prev.current;
    const to = +target || 0;
    if(from===to){ setVal(to); return; }
    let raf, start=null;
    const step = ts => {
      if(!start) start = ts;
      const t = Math.min(1, (ts-start)/dur);
      const ease = 1 - Math.pow(1-t, 3);
      setVal(from + (to-from)*ease);
      if(t<1) raf = requestAnimationFrame(step);
      else { prev.current = to; setVal(to); }
    };
    raf = requestAnimationFrame(step);
    return ()=> cancelAnimationFrame(raf);
  },[target,dur]);
  return val;
}

function Reveal({children, d=0, as:Tag='div', className='', style, ...rest}){
  const ref = useRef(null);
  useEffect(()=>{
    if(!ref.current) return;
    if(prefersReducedMotion()){ ref.current.classList.add('in'); return; }
    const el = ref.current;
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{
        if(e.isIntersecting){ el.classList.add('in'); io.unobserve(el); }
      });
    }, {threshold:0.1, rootMargin:'0px 0px -8% 0px'});
    io.observe(el);
    return ()=> io.disconnect();
  },[]);
  return <Tag ref={ref} className={"reveal "+className} data-d={d} style={style} {...rest}>{children}</Tag>;
}

function CursorGlow(){
  const ref = useRef(null);
  useEffect(()=>{
    if(prefersReducedMotion()) return;
    if(window.matchMedia('(hover:none)').matches) return;
    const el = ref.current; if(!el) return;
    let raf, x=window.innerWidth/2, y=window.innerHeight/2, tx=x, ty=y, idle;
    const onMove = e => {
      tx = e.clientX; ty = e.clientY;
      el.style.opacity = 1;
      clearTimeout(idle);
      idle = setTimeout(()=> el.style.opacity = 0, 1800);
    };
    const tick = () => {
      x += (tx-x)*0.10; y += (ty-y)*0.10;
      el.style.transform = `translate(${x}px, ${y}px) translate(-50%, -50%)`;
      raf = requestAnimationFrame(tick);
    };
    window.addEventListener('mousemove', onMove, {passive:true});
    raf = requestAnimationFrame(tick);
    return ()=>{ window.removeEventListener('mousemove', onMove); cancelAnimationFrame(raf); clearTimeout(idle); };
  },[]);
  return <div className="cursor-glow" ref={ref} aria-hidden="true"/>;
}

/* ============================================================
   SETTLEMENT MODULE
   ============================================================ */
function SettlementModule(){
  const { state, update, toast, t, currentUser, perms, todaysSettlement } = useApp();
  const [openingCash,setOpeningCash] = useState(state.settings.settlement?.defaultOpeningCash || 500000);
  const [closingCash,setClosingCash] = useState('');
  const [notes,setNotes] = useState('');
  const [history,setHistory] = useState(false);

  const snapshot = useMemo(()=> computeSettlementSnapshot(state, todayISO()), [state.orders]);
  const expectedCash = (todaysSettlement?.openingCash||0) + (snapshot.byPayment?.Cash||0);
  const diff = (+closingCash||0) - expectedCash;

  function openDay(){
    if(todaysSettlement){ toast('Hari sudah dibuka','warn'); return; }
    const s = newSettlement(todayISO(), currentUser.id, openingCash);
    update(st => ({ settlements: [...st.settlements, s] }));
    toast(`${t('open_day')} · ${fmtIDR(openingCash)}`,'ok');
  }
  function closeDay(){
    if(!todaysSettlement){ toast('Belum dibuka','warn'); return; }
    if(!confirm(t('confirm_close_day'))) return;
    const snap = computeSettlementSnapshot(state, todayISO());
    update(st => ({
      settlements: st.settlements.map(s => s.id===todaysSettlement.id ? {
        ...s, status:'closed', closedAt:new Date().toISOString(), closedBy:currentUser.id,
        closingCash:+closingCash||0, notes, snapshot:snap, updatedAt:new Date().toISOString()
      } : s)
    }));
    toast(`${t('close_day')} · ${todayISO()}`,'ok');
  }

  const canClose = perms?.canCloseDay;
  const status = todaysSettlement?.status || 'none';

  // History
  const closedSettlements = (state.settlements||[]).filter(s => s.status==='closed').sort((a,b)=> b.date.localeCompare(a.date));

  return (
    <div className="col gap-lg">
      <div>
        <div className="sec-mark"><span className="label">N° 01 — {t('settlement')}</span><span className="line"/></div>
        <h2 style={{fontSize:'clamp(36px, 5vw, 56px)',margin:'12px 0 8px'}}>{t('daily_settlement')}</h2>
        <div className="dim" style={{maxWidth:560,fontSize:14}}>
          {fmtDate(todayISO())} · {currentUser?.displayName} · {t('role_'+currentUser?.role)}
        </div>
      </div>

      {/* Status badge */}
      <div className="row">
        <span className={"pill "+(status==='closed'?'maroon':status==='pending'?'warn':status==='open'?'ok':'')}>
          {status==='closed' ? t('status_closed') : status==='pending' ? t('status_pending') : status==='open' ? t('status_open') : '—'}
        </span>
        {todaysSettlement?.openedAt && <span className="tiny dim">Buka: {new Date(todaysSettlement.openedAt).toLocaleString('id-ID')}</span>}
        {todaysSettlement?.closedAt && <span className="tiny dim">Tutup: {new Date(todaysSettlement.closedAt).toLocaleString('id-ID')}</span>}
      </div>

      {/* No settlement yet — open day */}
      {!todaysSettlement && (
        <div className="card">
          <div className="card-h"><div><div className="eyebrow">{t('open_day')}</div><h3>{t('no_settlement_today')}</h3></div></div>
          <div className="grid-2 mt-md">
            <div className="field"><label>{t('opening_cash')} (Rp)</label>
              <input className="input mono" type="number" value={openingCash} onChange={e=>setOpeningCash(e.target.value)}/>
            </div>
            <div style={{display:'flex',alignItems:'flex-end'}}>
              <button className="btn primary" onClick={openDay} style={{padding:'14px 28px'}}>
                <I name="play" size={12}/>{t('open_with_cash')}
              </button>
            </div>
          </div>
