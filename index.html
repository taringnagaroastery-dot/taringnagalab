/* ============================================================
   USERS MANAGEMENT MODULE (admin only)
   ============================================================ */
function UsersModule(){
  const { state, update, toast, t, currentUser } = useApp();
  const [tab,setTab] = useState('users');
  const [editing,setEditing] = useState(null);
  const users = state.auth?.users || [];

  function delUser(u){
    if(u.id === currentUser.id){ toast(t('cannot_delete_self'),'warn'); return; }
    if(!confirm(`${t('delete_user')}: ${u.displayName}?`)) return;
    update(s => ({ ...s, auth: { ...s.auth, users: s.auth.users.filter(x=>x.id!==u.id) }}));
    toast('Deleted','ok');
  }

  const allRoleLabels = useMemo(()=>{
    const labels = {};
    for(const r of getAllRoles(state.settings)){
      const p = getPerms(state.settings, r);
      labels[r] = p.label || t('role_'+r) || r;
    }
    return labels;
  },[state.settings,t]);

  return (
    <div className="col gap-lg">
      <div>
        <div className="sec-mark"><span className="label">N° 01 — {t('users_mgmt')}</span><span className="line"/></div>
        <div className="row" style={{justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:14}}>
          <h2 style={{fontSize:'clamp(34px, 4.5vw, 52px)',margin:'12px 0 0'}}>{t('users_mgmt')}</h2>
          {tab==='users' && <button className="btn primary" onClick={()=>setEditing({_new:true,role:'pegawai',active:true})}><I name="plus" size={12}/>{t('add_user')}</button>}
        </div>
      </div>

      <div className="tabs">
        <div className={"tab "+(tab==='users'?'active':'')} onClick={()=>setTab('users')}>{t('users_mgmt')}</div>
        <div className={"tab "+(tab==='roles'?'active':'')} onClick={()=>setTab('roles')}>Roles & Permissions</div>
      </div>

      {tab==='users' && (
        <div style={{overflowX:'auto'}}>
          <table className="tbl">
            <thead><tr>
              <th>{t('username')}</th><th>{t('display_name')}</th><th>{t('role')}</th><th>Status</th><th>{t('last_login')}</th><th></th>
            </tr></thead>
            <tbody>
              {users.map(u=>(
                <tr key={u.id} className="clickable" onClick={()=>setEditing(u)}>
                  <td className="mono">{u.username}</td>
                  <td className="bright">{u.displayName}</td>
                  <td><span className={"pill "+(u.role==='admin'?'maroon':u.role==='owner'?'gold':'')}>{allRoleLabels[u.role]||u.role}</span></td>
                  <td>{u.active ? <span className="pill ok">{t('active')}</span> : <span className="pill">{t('inactive')}</span>}</td>
                  <td className="mono dim tiny">{u.lastLogin ? new Date(u.lastLogin).toLocaleString('id-ID') : '—'}</td>
                  <td><button className="btn sm ghost icon" onClick={e=>{e.stopPropagation();setEditing(u);}}><I name="edit" size={12}/></button></td>
                </tr>
              ))}
              {users.length===0 && <tr><td colSpan={6} className="muted" style={{textAlign:'center',padding:30}}>{t('no_users')}</td></tr>}
            </tbody>
          </table>
        </div>
      )}

      {tab==='roles' && <RolesEditor/>}

      {editing && <UserEditor user={editing} onClose={()=>setEditing(null)} onDelete={delUser} roleLabels={allRoleLabels}/>}
    </div>
  );
}

/* ============================================================
   ROLES & PERMISSIONS EDITOR
   ============================================================ */
function RolesEditor(){
  const { state, update, toast, t } = useApp();
  const perms = state.settings.permissions || DEFAULT_PERMS;
  const [addOpen,setAddOpen] = useState(false);

  function updatePerm(role, key, value){
    update({ settings: { ...state.settings, permissions: {
      ...perms,
      [role]: { ...perms[role], [key]: value }
    }}});
  }
  function togglePage(role, page){
    const r = perms[role] || {};
    const pages = r.pages || [];
    const next = pages.includes(page) ? pages.filter(p=>p!==page) : [...pages, page];
    updatePerm(role, 'pages', next);
  }
  function deleteRole(role){
    if(perms[role]?.system){ toast('Cannot delete system role','warn'); return; }
    // Check no user has this role
    if((state.auth?.users||[]).some(u=>u.role===role)){
      toast('Tidak bisa hapus — ada user dengan role ini','warn'); return;
    }
    if(!confirm(`Hapus role "${perms[role]?.label||role}"?`)) return;
    const { [role]:_, ...rest } = perms;
    update({ settings: { ...state.settings, permissions: rest }});
    toast('Role removed','ok');
  }
  function renameRole(role, newLabel){
    updatePerm(role, 'label', newLabel);
  }

  const roleList = Object.keys(perms);
  const pageLabels = {
    dashboard: t('nav_home'), roast: t('nav_roast'), inventory: t('nav_inventory'),
    pos: t('nav_pos'), reports: t('nav_reports'), settlement: t('settlement'),
    users: t('users_mgmt'), settings: t('nav_settings')
  };
  const capLabels = {
    canCloseDay: 'Close Settlement',
    canEditPrice: 'Edit Pricing',
    canEditUsers: 'Manage Users',
    canSeeReports: 'View Reports',
    canDeleteAny: 'Delete Records',
    canEditSettings: 'Edit Settings',
    canEditBranding: 'Edit Branding',
  };

  return (
    <div className="col gap-lg">
      <div className="row" style={{justifyContent:'space-between',flexWrap:'wrap',gap:14}}>
        <div>
          <div className="dim" style={{maxWidth:560,lineHeight:1.65}}>
            Atur akses halaman dan kapabilitas tiap role/jabatan. Default role (admin, owner, pegawai) tidak bisa dihapus tapi izinnya bisa di-edit. Tambah role kustom untuk jabatan spesifik (kasir, supervisor, barista, dll).
          </div>
        </div>
        <button className="btn primary" onClick={()=>setAddOpen(true)}><I name="plus" size={12}/>Tambah Role</button>
      </div>

      {/* Self-signup setting */}
      <div className="card" style={{padding:20}}>
        <div className="row" style={{justifyContent:'space-between',flexWrap:'wrap',gap:14,alignItems:'center'}}>
          <div style={{flex:1,minWidth:220}}>
            <div className="label">Self-Signup</div>
            <h3 style={{fontSize:20,margin:'6px 0'}}>Izinkan signup dari halaman login</h3>
            <div className="tiny dim" style={{maxWidth:520,lineHeight:1.65}}>
              Jika <strong>ON</strong>, siapa saja yang buka login screen bisa daftar dengan role default. Jika <strong>OFF</strong>, hanya admin yang bisa buat user baru via Users tab.
            </div>
          </div>
          <Toggle
            on={state.settings.allowSelfSignup === true}
            onChange={v => update({settings:{...state.settings, allowSelfSignup:v}})}
            label={state.settings.allowSelfSignup ? 'AKTIF' : 'MATI'}
          />
        </div>
        {state.settings.allowSelfSignup && (
          <div className="field mt-md" style={{maxWidth:300}}>
            <label>Role default untuk self-signup</label>
            <select className="select" value={state.settings.defaultSignupRole||'pegawai'} onChange={e=>update({settings:{...state.settings, defaultSignupRole:e.target.value}})}>
              {Object.keys(perms).map(r=>(
                <option key={r} value={r}>{perms[r].label||r}</option>
              ))}
            </select>
            <div className="tiny dim mt-sm">Otomatis dipilih saat user signup dari halaman login</div>
          </div>
        )}
      </div>

      {roleList.map(role=>{
        const r = perms[role] || {};
        return (
          <div key={role} className="card">
            <div className="row" style={{justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
              <div className="row">
                <span className={"pill "+(role==='admin'?'maroon':role==='owner'?'gold':'')}>{role}</span>
                <input className="input" value={r.label||role} onChange={e=>renameRole(role, e.target.value)} style={{maxWidth:240}}/>
                {r.system && <span className="tiny dim">· system role</span>}
              </div>
              {!r.system && (
                <button className="btn danger sm" onClick={()=>deleteRole(role)}><I name="trash" size={11}/>Delete</button>
              )}
            </div>

            <div className="mt-lg">
              <div className="label">Akses Halaman</div>
              <div className="row mt-sm" style={{flexWrap:'wrap',gap:8}}>
                {ALL_PAGES.map(page=>{
                  const on = (r.pages||[]).includes(page);
                  return (
                    <button key={page} type="button" className={"btn sm "+(on?'primary':'ghost')}
                      onClick={()=>togglePage(role, page)}
                      style={{textTransform:'none',letterSpacing:'.04em',fontSize:12,fontFamily:'var(--sans)'}}>
                      {on && <I name="check" size={10}/>}{pageLabels[page]||page}
                    </button>
                  );
                })}
              </div>
            </div>

            <div className="mt-lg">
              <div className="label">Kapabilitas</div>
              <div className="grid-2 mt-sm">
                {ALL_CAPS.map(cap=>(
                  <label key={cap} className="checkbox" style={{padding:'8px 0'}}>
                    <input type="checkbox" checked={!!r[cap]} onChange={e=>updatePerm(role, cap, e.target.checked)}/>
                    <span>{capLabels[cap]||cap}</span>
                  </label>
                ))}
              </div>
            </div>
          </div>
        );
      })}

      {addOpen && <AddRoleModal onClose={()=>setAddOpen(false)}/>}
    </div>
  );
}

function AddRoleModal({onClose}){
  const { state, update, toast } = useApp();
  const [id,setId] = useState('');
  const [label,setLabel] = useState('');
  const [err,setErr] = useState('');

  function save(){
    setErr('');
    const cleanId = id.trim().toLowerCase().replace(/[^a-z0-9_]/g,'');
    if(!cleanId){ setErr('ID role wajib (lowercase a-z 0-9)'); return; }
    if(state.settings.permissions?.[cleanId]){ setErr('Role ID sudah ada'); return; }
    const newRole = {
      label: label||cleanId,
      system: false,
      pages: ['dashboard','pos'],
      canCloseDay:false, canEditPrice:false, canEditUsers:false,
      canSeeReports:false, canDeleteAny:false, canEditSettings:false, canEditBranding:false,
    };
    update({ settings: { ...state.settings, permissions: { ...state.settings.permissions, [cleanId]:newRole }}});
    toast('Role added: '+(label||cleanId),'ok');
    onClose();
  }

  return (
    <Modal title="Tambah Role Baru" onClose={onClose}
      footer={<>
        <div style={{flex:1}}/>
        <button className="btn ghost" onClick={onClose}>Batal</button>
        <button className="btn primary" onClick={save}>Tambah</button>
      </>}>
      <div className="col gap-md">
        <div className="field"><label>ID Role (lowercase, no space)</label>
          <input className="input mono" value={id} onChange={e=>setId(e.target.value)} placeholder="kasir, barista, supervisor"/>
        </div>
        <div className="field"><label>Nama Tampilan</label>
          <input className="input" value={label} onChange={e=>setLabel(e.target.value)} placeholder="Kasir / Supervisor / dll"/>
        </div>
        {err && <div style={{color:'var(--danger)',fontSize:13}}>{err}</div>}
      </div>
    </Modal>
  );
}

function UserEditor({user, onClose, onDelete, roleLabels}){
  const { state, update, toast, t, currentUser } = useApp();
  const isNew = user._new;
  const [username,setUsername] = useState(user.username||'');
  const [displayName,setDisplayName] = useState(user.displayName||'');
  const [role,setRole] = useState(user.role||'pegawai');
  const [active,setActive] = useState(user.active!==false);
  const availableRoles = getAllRoles(state.settings);
  const [password,setPassword] = useState('');
  const [confirmPw,setConfirmPw] = useState('');
  const [err,setErr] = useState('');

  async function save(){
    setErr('');
    if(!username){ setErr('Username required'); return; }
    if(isNew && !password){ setErr('Password required'); return; }
    if(password && password!==confirmPw){ setErr(t('password_mismatch')); return; }
    // Check duplicate
    if((state.auth.users||[]).some(u=>u.username===username.toLowerCase() && u.id!==user.id)){ setErr(t('user_exists')); return; }
    const passHash = password ? await hashPassword(password) : user.passHash;
    const finalUser = isNew
      ? makeUser({ username, displayName: displayName||username, role, passHash, active })
      : { ...user, username:username.toLowerCase(), displayName, role, active, passHash, updatedAt:new Date().toISOString() };
    update(s => ({
      auth: { ...s.auth, users: isNew ? [...s.auth.users, finalUser] : s.auth.users.map(u=>u.id===finalUser.id?finalUser:u) }
    }));
    toast(isNew? t('user_created'):'Updated','ok');
    onClose();
  }

  return (
    <Modal title={isNew? t('add_user'): t('edit_user')+' · '+user.displayName} onClose={onClose}
      footer={<>
        {!isNew && user.id !== currentUser.id && <button className="btn danger" onClick={()=>{ onDelete(user); onClose(); }}><I name="trash" size={11}/>{t('delete_user')}</button>}
        <div style={{flex:1}}/>
        <button className="btn ghost" onClick={onClose}>{t('cancel')}</button>
        <button className="btn primary" onClick={save}><I name="check" size={12}/>{t('save')}</button>
      </>}>
      <div className="col gap-md">
        <div className="grid-2">
          <div className="field"><label>{t('username')}</label>
            <input className="input mono" value={username} onChange={e=>setUsername(e.target.value)} autoComplete="off"/>
          </div>
          <div className="field"><label>{t('display_name')}</label>
            <input className="input" value={displayName} onChange={e=>setDisplayName(e.target.value)}/>
          </div>
          <div className="field"><label>{t('role')}</label>
            <select className="select" value={role} onChange={e=>setRole(e.target.value)}>
              {availableRoles.map(r=>(
                <option key={r} value={r}>{roleLabels?.[r] || r}</option>
              ))}
            </select>
          </div>
          <div className="field"><label>Status</label>
            <label className="checkbox" style={{marginTop:8}}>
              <input type="checkbox" checked={active} onChange={e=>setActive(e.target.checked)}/> {t('active')}
            </label>
          </div>
        </div>
        <div className="grid-2">
          <div className="field"><label>{isNew? t('password') : t('new_password')+' (opsional)'}</label>
            <input className="input" type="password" value={password} onChange={e=>setPassword(e.target.value)} autoComplete="new-password"/>
          </div>
          <div className="field"><label>{t('confirm_password')}</label>
            <input className="input" type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)} autoComplete="new-password"/>
          </div>
        </div>
        {err && <div style={{color:'var(--danger)',fontSize:13}}>{err}</div>}
      </div>
    </Modal>
  );
}

/* ============================================================
   ERROR BOUNDARY — catches rendering errors gracefully
   ============================================================ */
class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { hasError:false, error:null, info:null }; }
  static getDerivedStateFromError(error){ return { hasError:true, error }; }
  componentDidCatch(error, info){
    console.error('[TN Lab] Render error:', error, info);
    this.setState({ info });
  }
  resetState(){
    if(confirm('Reset semua data lokal? Login dan settings akan hilang. Lakukan ini hanya jika app tidak bisa dipakai.')){
      try { localStorage.removeItem(STORE_KEY); } catch(e){}
      location.reload();
    }
  }
  reload(){ location.reload(); }
  render(){
    if(this.state.hasError){
      const msg = String(this.state.error?.message || this.state.error || 'Unknown error');
      const stack = this.state.error?.stack || this.state.info?.componentStack || '';
      return (
        <div style={{
          position:'fixed',inset:0,overflow:'auto',padding:'clamp(24px,5vw,48px)',
          background:'#f5efe6',color:'#0a0606',fontFamily:'Inter,system-ui,sans-serif',
        }}>
          <div style={{maxWidth:680,margin:'40px auto'}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:'.24em',textTransform:'uppercase',color:'#a13e2c',fontWeight:600}}>Crashed</div>
            <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(34px,6vw,52px)',margin:'12px 0 8px',color:'#5a0f1a',fontWeight:500}}>
              Aplikasi crashed
            </h1>
            <div style={{color:'#3d2d20',lineHeight:1.6,marginBottom:24,maxWidth:560}}>
              Ada error rendering. Coba reload, atau reset data lokal kalau persisten.
            </div>
            <div style={{padding:16,background:'rgba(161,62,44,.08)',border:'1px solid rgba(161,62,44,.3)',borderRadius:2,marginBottom:18}}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:'#a13e2c',marginBottom:8,wordBreak:'break-word'}}>{msg}</div>
              {stack && <pre style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10.5,color:'#7a6a55',whiteSpace:'pre-wrap',maxHeight:200,overflow:'auto',margin:0}}>{stack}</pre>}
            </div>
            <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
              <button onClick={()=>this.reload()} style={{padding:'12px 22px',background:'#5a0f1a',color:'#f5efe6',border:'1px solid #5a0f1a',fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:'.18em',textTransform:'uppercase',cursor:'pointer'}}>Reload Page</button>
              <button onClick={()=>this.resetState()} style={{padding:'12px 22px',background:'transparent',color:'#a13e2c',border:'1px solid rgba(161,62,44,.5)',fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:'.18em',textTransform:'uppercase',cursor:'pointer'}}>Reset Data Lokal</button>
            </div>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

          boxShadow:'0 2px 6px rgba(0,0,0,.18)'
        }}/>
      </span>
      {label && <span className="mono" style={{fontSize:10.5,letterSpacing:'.2em',color: on?'var(--accent)':'var(--text-3)',fontWeight:600}}>{label}</span>}
    </label>
  );
}

function IntervalPicker({ value, onChange, presets=[], min=1, max=86400, disabled=false }){
  const [custom,setCustom] = useState(value || min);
  useEffect(()=>{ setCustom(value); },[value]);
  const isPreset = presets.some(p => p.v === value);
  return (
    <div className="col" style={{gap:10,marginTop:6}}>
      <div className="row" style={{flexWrap:'wrap',gap:8}}>
        {presets.map(p=>(
          <button key={p.v} type="button"
            className={"btn sm "+(value===p.v?'primary':'ghost')}
            disabled={disabled}
            onClick={()=> onChange(p.v)}
            style={{fontSize:11}}>
            {p.label}
          </button>
        ))}
        <button type="button" className={"btn sm "+(!isPreset?'primary':'ghost')} disabled={disabled} style={{fontSize:11}}>Custom</button>
      </div>
      <div className="row" style={{gap:10,alignItems:'center'}}>
        <input
          className="input mono"
          type="number"
          min={min}
          max={max}
          value={custom||''}
          disabled={disabled}
          onChange={e=>{
            const v = parseInt(e.target.value)||0;
            setCustom(v);
            if(v>=min && v<=max) onChange(v);
          }}
          style={{maxWidth:160}}
        />
        <span className="tiny dim">detik · min {min}s · max {fmtInterval(max)}</span>
        <span style={{flex:1}}/>
        {value>=min && <span className="pill gold">= {fmtInterval(value)}</span>}
      </div>
    </div>
  );
}

function fmtInterval(s){
  if(!s || s<1) return 'mati';
  if(s<60) return s+' detik';
  if(s<3600) return Math.floor(s/60)+' menit'+(s%60? ' '+(s%60)+'s':'');
  return Math.floor(s/3600)+' jam'+(s%3600? ' '+Math.floor((s%3600)/60)+'m':'');
}

/* ============================================================
   BRAND INJECTOR — favicon + page title
   ============================================================ */
function BrandInjector({ brand, businessName }){
  useEffect(()=>{
    if(!brand) return;
    // Title
    const newTitle = (brand.appName || businessName || 'Taring Naga Lab') + ' — Operations Suite';
    document.title = newTitle;
    // Favicon
    if(brand.useCustomFavicon && brand.faviconData){
      // Remove existing icon links
      document.querySelectorAll('link[rel*="icon"]').forEach(l=>{
        if(!l.dataset.tnBackup) {
          l.dataset.tnOrig = l.href;
        }
      });
      // Inject new link
      let link = document.querySelector('link[rel="icon"][data-tn-custom]');
      if(!link){
        link = document.createElement('link');
        link.rel = 'icon';
        link.dataset.tnCustom = 'true';
        document.head.appendChild(link);
      }
      link.href = brand.faviconData;
      link.type = brand.faviconData.startsWith('data:image/svg') ? 'image/svg+xml' : 'image/png';
    } else {
      // Remove custom favicon if previously set
      document.querySelectorAll('link[rel="icon"][data-tn-custom]').forEach(l=>l.remove());
    }
  },[brand, businessName]);
  return null;
}

/* ============================================================
   THEME INJECTOR — applies palette + density to :root
   ============================================================ */
function ThemeInjector({ theme }){
  useEffect(()=>{
    if(!theme) return;
    const root = document.documentElement;
    const hexToRgb = h => { const n=parseInt(h.replace('#',''),16); return [(n>>16)&255,(n>>8)&255,n&255]; };
    const setCss = (k,v)=> root.style.setProperty(k, v);
    if(theme.mode === 'maroon'){
      // Dark/maroon dominant fallback
      const [r,g,b] = hexToRgb(theme.cottonColor||'#f5efe6');
      setCss('--bg', theme.maroonDeepColor||'#3d0810');
      setCss('--bg-2', '#4a0e16');
      setCss('--bg-3', '#5a141d');
      setCss('--text', `rgb(${r} ${g} ${b})`);
      setCss('--text-2', `rgba(${r},${g},${b},.78)`);
      setCss('--text-3', `rgba(${r},${g},${b},.55)`);
      setCss('--border', 'rgba(245,239,230,.12)');
      setCss('--border-2', 'rgba(245,239,230,.20)');
      setCss('--accent', theme.goldColor||'#c9a961');
      setCss('--accent-2', '#b8965a');
    } else {
      // Cotton/light dominant (default)
      setCss('--bg', theme.cottonColor||'#f5efe6');
      setCss('--bg-2', '#ebe3d4');
      setCss('--bg-3', '#dfd5c2');
      setCss('--text', '#0a0606');
      setCss('--text-2', '#3d2d20');
      setCss('--text-3', '#7a6a55');
      setCss('--border', 'rgba(10,6,6,.10)');
      setCss('--border-2', 'rgba(10,6,6,.18)');
      setCss('--accent', theme.accentColor||'#5a0f1a');
      setCss('--accent-2', '#7a1a26');
    }
    setCss('--gold', theme.goldColor||'#c9a961');
    // Density — adjust section spacing
    if(theme.density === 'compact'){
      setCss('--page-x','clamp(14px, 3.5vw, 36px)');
      setCss('--section-y','clamp(32px, 4.5vh, 56px)');
    } else {
      setCss('--page-x','clamp(20px, 5vw, 56px)');
      setCss('--section-y','clamp(48px, 7vh, 80px)');
    }
    // Sidebar position
    if(theme.sidebarPos === 'right'){
      root.style.setProperty('--sidebar-order','2');
    } else {
      root.style.setProperty('--sidebar-order','0');
    }
  },[theme]);
  return null;
}

/* ============================================================
   LOGIN SCREEN
   ============================================================ */
function LoginScreen({ users, onLogin, onSetupAdmin, t, settings }){
  const isFirstTime = users.length === 0;
  const [mode,setMode] = useState(isFirstTime ? 'signup' : 'signin');
  const [username,setUsername] = useState('');
  const [password,setPassword] = useState('');
  const [confirmPw,setConfirmPw] = useState('');
  const [displayName,setDisplayName] = useState('');
  const [role,setRole] = useState(isFirstTime ? 'admin' : (settings.defaultSignupRole || 'pegawai'));
  const [err,setErr] = useState('');
  const [loading,setLoading] = useState(false);

  // Available roles read from settings (allows custom roles too)
  const availableRoles = getAllRoles(settings);
  const roleLabel = (r) => {
    const p = getPerms(settings, r);
    return p.label || t('role_'+r) || r;
  };
  // Selfsignup permission: first-time always allowed; otherwise gated by setting
  const allowSelfSignup = isFirstTime || settings.allowSelfSignup === true;

  async function submit(e){
    e?.preventDefault();
    setErr('');
    if(!username || !password){ setErr(t('invalid_credentials')); return; }
    setLoading(true);
    try {
      const hash = await hashPassword(password);
      if(mode === 'signin'){
        const u = users.find(x => x.username === username.toLowerCase() && x.passHash === hash && x.active);
        if(!u){ setErr(t('invalid_credentials')); setLoading(false); return; }
        onLogin(u);
      } else {
        if(!allowSelfSignup){ setErr('Self-signup dimatikan. Hubungi admin.'); setLoading(false); return; }
        if(password !== confirmPw){ setErr(t('password_mismatch')); setLoading(false); return; }
        if(users.find(u=>u.username===username.toLowerCase())){ setErr(t('user_exists')); setLoading(false); return; }
        // First-time always admin; otherwise use selected role (validated against available)
        const finalRole = isFirstTime ? 'admin' : (availableRoles.includes(role) ? role : 'pegawai');
        const user = makeUser({ username, displayName: displayName||username, role:finalRole, passHash:hash });
        onSetupAdmin(user);
      }
    } catch(e){ setErr(String(e.message||e)); }
    setLoading(false);
  }

  return (
    <div className="tn-login-scroll" style={{
      position:'fixed', inset:0,
      overflowY:'auto', overflowX:'hidden',
      background:'var(--bg)',
      WebkitOverflowScrolling:'touch',
      zIndex:10,
    }}>
      <div style={{
        minHeight:'100%',
        display:'flex',
        alignItems:'center',
        justifyContent:'center',
        padding:'clamp(24px, 5vw, 48px) clamp(16px, 4vw, 24px)',
        boxSizing:'border-box',
      }}>
        <div style={{maxWidth:420, width:'100%'}}>
          <div style={{textAlign:'center', marginBottom:24}}>
            <div style={{display:'inline-block'}}>
              <BrandMark
                size={56}
                custom={settings.brand?.useCustomLogo ? settings.brand?.appLogo : null}
              />
            </div>
            <div className="label" style={{marginTop:14}}>{settings.brand?.appName || settings.businessName || 'Taring Naga Lab'}</div>
            <h1 style={{fontSize:'clamp(28px, 5.5vw, 48px)', margin:'10px 0 6px', color:'var(--text)', lineHeight:1.1}}>
              {t('welcome_to')} <em>Lab</em>.
            </h1>
            <div className="dim" style={{fontSize:13.5}}>{isFirstTime ? t('first_time_setup') : t('sign_in_to_continue')}</div>
          </div>

          <form onSubmit={submit} className="col gap-md" style={{borderTop:'1px solid var(--border)', paddingTop:20}}>
            {isFirstTime && (
              <div className="pill warn" style={{alignSelf:'center'}}>{t('first_user_admin')}</div>
            )}
            <div className="field">
              <label>{t('username')}</label>
              <input className="input" autoFocus value={username} onChange={e=>setUsername(e.target.value)} autoComplete="username" required/>
            </div>
            {mode==='signup' && (
              <div className="field">
                <label>{t('display_name')}</label>
                <input className="input" value={displayName} onChange={e=>setDisplayName(e.target.value)} placeholder={username}/>
              </div>
            )}
            {/* Role selector for signup */}
            {mode==='signup' && (
              <div className="field">
                <label>{t('role')}{isFirstTime && <span className="tiny dim" style={{marginLeft:8,letterSpacing:0,textTransform:'none'}}>· {t('first_user_admin')}</span>}</label>
                <select
                  className="select"
                  value={role}
                  onChange={e=>setRole(e.target.value)}
                  disabled={isFirstTime}
                  style={isFirstTime?{opacity:.75,cursor:'not-allowed'}:{}}
                >
                  {availableRoles.map(r => (
                    <option key={r} value={r}>{roleLabel(r)}</option>
                  ))}
                </select>
                {isFirstTime ? (
                  <div className="tiny dim" style={{marginTop:6}}>
                    User pertama otomatis Administrator. Setelah login, Anda bisa atur izin role lain di <em>Users → Roles & Permissions</em>.
                  </div>
                ) : (
                  <div className="tiny dim" style={{marginTop:6}}>
                    Pilih jabatan Anda. Admin dapat menyesuaikan izin per role.
                  </div>
                )}
              </div>
            )}
            <div className="field">
              <label>{t('password')}</label>
              <input className="input" type="password" value={password} onChange={e=>setPassword(e.target.value)} autoComplete={mode==='signup'?'new-password':'current-password'} required/>
            </div>
            {mode==='signup' && (
              <div className="field">
                <label>{t('confirm_password')}</label>
                <input className="input" type="password" value={confirmPw} onChange={e=>setConfirmPw(e.target.value)} required/>
              </div>
            )}
            {err && <div style={{color:'var(--danger)', fontSize:13, padding:'8px 0'}}>{err}</div>}
            <button type="submit" className="btn primary" style={{padding:'14px', justifyContent:'center'}} disabled={loading}>
              {loading? t('loading') : (mode==='signin' ? t('sign_in') : t('sign_up'))}
            </button>
            {!isFirstTime && allowSelfSignup && (
              <div className="row" style={{justifyContent:'center', marginTop:6}}>
                <button type="button" className="btn ghost sm" onClick={()=>setMode(mode==='signin'?'signup':'signin')}>
                  {mode==='signin' ? t('sign_up') : t('sign_in')}
                </button>
              </div>
            )}
            {!isFirstTime && !allowSelfSignup && mode==='signin' && (
              <div className="tiny dim" style={{textAlign:'center',marginTop:6,padding:'8px 0'}}>
                Self-signup dimatikan · hubungi admin untuk dibuatkan akun
              </div>
            )}
          </form>

          <div style={{textAlign:'center', marginTop:24, paddingTop:16, borderTop:'1px solid var(--border)'}}>
            <div className="hero-quote" style={{fontSize:15, color:'var(--text-2)', margin:0}}>
              {settings.brand?.loginQuote || '"Kopi yang baik punya gigi."'}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   ROOT APP
   ============================================================ */
function App(){
  const [state,setState] = useState(()=>Store.load());
  const [page,setPage] = useState(()=>{
    const p = new URLSearchParams(location.search).get('page');
    return ['dashboard','roast','inventory','pos','reports','settings'].includes(p) ? p : 'dashboard';
  });
  const [toasts,setToasts] = useState([]);
  const [installAvailable,setInstallAvailable] = useState(!!window.__deferredInstallPrompt);
  const [printerConnected,setPrinterConnected] = useState(false);
  const [syncTick,setSyncTick] = useState(0);
  const stateRef = useRef(state);
  useEffect(()=>{ stateRef.current = state; },[state]);

  useEffect(()=>{ Store.save(state); },[state]);

  // Auto-stamp updatedAt on entity changes
  const update = useCallback((patch)=>{
    setState(s => {
      const next = typeof patch==='function' ? patch(s) : patch;
      const now = new Date().toISOString();
      const stampList = (oldArr, newArr) => {
        if(!Array.isArray(newArr)) return newArr;
        const oldMap = new Map((oldArr||[]).map(x=>[x.id, x]));
        return newArr.map(it => {
          const o = oldMap.get(it.id);
          if(!o) return {...it, updatedAt: it.updatedAt||now};
          // shallow compare keys; if anything differs, bump updatedAt
          const oKeys = Object.keys(o), nKeys = Object.keys(it);
          let same = oKeys.length===nKeys.length;
          if(same){
            for(const k of nKeys){
              if(k==='updatedAt') continue;
              if(JSON.stringify(o[k]) !== JSON.stringify(it[k])){ same=false; break; }
            }
          }
          return same ? it : {...it, updatedAt: now};
        });
      };
      const merged = {...s, ...next};
      if(next.beans) merged.beans = stampList(s.beans, next.beans);
      if(next.products) merged.products = stampList(s.products, next.products);
      if(next.roastLogs) merged.roastLogs = stampList(s.roastLogs, next.roastLogs);
      if(next.cuppings) merged.cuppings = stampList(s.cuppings, next.cuppings);
      if(next.orders) merged.orders = stampList(s.orders, next.orders);
      if(next.settings) merged.settings = {...s.settings, ...next.settings, updatedAt: now};
      return merged;
    });
  },[]);

  const toast = useCallback((msg, kind='ok')=>{
    const id = Date.now()+Math.random();
    setToasts(t => [...t, {id, msg, kind}]);
    setTimeout(()=> setToasts(t => t.filter(x=>x.id!==id)), 3500);
  },[]);

  // Install prompt
  useEffect(()=>{
    const onReady = () => setInstallAvailable(!!window.__deferredInstallPrompt);
    const onInstalled = () => setInstallAvailable(false);
    window.addEventListener('tn:installprompt-ready', onReady);
    window.addEventListener('tn:installed', onInstalled);
    return ()=>{
      window.removeEventListener('tn:installprompt-ready', onReady);
      window.removeEventListener('tn:installed', onInstalled);
    };
  },[]);
  const triggerInstall = useCallback(async ()=>{
    const ev = window.__deferredInstallPrompt;
    if(!ev) { toast('Install belum tersedia. Coba menu browser → "Add to Home Screen".','warn'); return; }
    ev.prompt();
    const { outcome } = await ev.userChoice;
    if(outcome==='accepted') toast('Terinstal ke home screen!','ok');
    window.__deferredInstallPrompt = null;
    setInstallAvailable(false);
  },[toast]);

  // Sync — subscribe to SyncSvc state changes
  useEffect(()=>{
    return SyncSvc.on(()=> setSyncTick(t=>t+1));
  },[]);

  // Auto sync loop — uses stateRef to avoid stale closure
  useEffect(()=>{
    const { syncEnabled, syncEndpoint, syncSecret, syncInterval } = state.settings;
    if(!syncEnabled || !syncEndpoint || !syncSecret || !syncInterval || syncInterval<5) return;
    let cancelled = false;
    let timer = null;
    const run = async () => {
      if(cancelled) return;
      try{
        const merged = await SyncSvc.push(syncEndpoint, syncSecret, stateRef.current);
        if(!cancelled && merged){
          setState(s => mergeStateFromServer(s, merged));
        }
      }catch(_){}
      if(!cancelled) timer = setTimeout(run, syncInterval*1000);
    };
    timer = setTimeout(run, syncInterval*1000);
    return ()=>{ cancelled=true; if(timer) clearTimeout(timer); };
  },[state.settings.syncEnabled, state.settings.syncEndpoint, state.settings.syncSecret, state.settings.syncInterval]);

  // Webhook polling for incoming orders
  useEffect(()=>{
    const { webhookEnabled, syncEndpoint, syncSecret, webhookPollInterval } = state.settings;
    if(!webhookEnabled || !syncEndpoint || !syncSecret || !webhookPollInterval || webhookPollInterval<5) return;
    let cancelled = false;
    let timer = null;
    const run = async () => {
      if(cancelled) return;
      try{
        const incoming = await SyncSvc.pullIncoming(syncEndpoint, syncSecret);
        if(!cancelled && incoming.length){
          const settingsNow = stateRef.current.settings;
          const toImport = incoming.map(row=>{
            const o = {
              id: row.id || ('o'+Date.now()+Math.random()),
              date: (row.createdAt||new Date().toISOString()).slice(0,10),
              time: (row.createdAt||new Date().toISOString()).slice(11,16),
              items: (row.order.items||[]).map(it=>({ productId: it.productId||null, name: it.name, price: +it.price||0, qty: +it.qty||1, subtotal: (+it.price||0)*(+it.qty||1) })),
              total: +row.order.total || 0,
              paid: +row.order.total || 0,
              channel: row.order.channel || 'Web',
              customer: row.order.customer || 'Web Customer',
              note: row.order.note||'',
              status: 'paid',
              source: row.order.source || 'taringnaga.id',
            };
            return {raw:row, order:o};
          });
          setState(s => ({ ...s, orders: [...toImport.map(x=>x.order), ...s.orders] }));
          await SyncSvc.markImported(syncEndpoint, syncSecret, toImport.map(x=>x.raw.id));
          toast(`${toImport.length} order baru dari web → masuk POS`, 'ok');
          if(settingsNow.printerAutoPrint && printerSingleton.connected){
            for(const t of toImport){
              try { await printerSingleton.send(buildReceiptBytes(t.order, settingsNow, settingsNow.printerWidth||32)); }catch(_){}
            }
          }
        }
      }catch(_){}
      if(!cancelled) timer = setTimeout(run, webhookPollInterval*1000);
    };
    timer = setTimeout(run, 3000);
    return ()=>{ cancelled=true; if(timer) clearTimeout(timer); };
  },[state.settings.webhookEnabled, state.settings.syncEndpoint, state.settings.syncSecret, state.settings.webhookPollInterval]);

  // Printer connection observer
  useEffect(()=>{
    const tick = setInterval(()=> setPrinterConnected(printerSingleton.connected), 1500);
    return ()=> clearInterval(tick);
  },[]);

  const manualSync = useCallback(async ()=>{
    try{
      const { syncEndpoint, syncSecret } = state.settings;
      const merged = await SyncSvc.push(syncEndpoint, syncSecret, state);
      setState(s => mergeStateFromServer(s, merged));
      toast('Sync berhasil ke spreadsheet.','ok');
    }catch(err){
      toast('Sync gagal: '+err.message, 'err');
    }
  },[state, toast]);

  const pendingCuppings = useMemo(()=>{
    const cuppedIds = new Set(state.cuppings.map(c=>c.logId));
    return state.roastLogs.filter(l=>{
      if(cuppedIds.has(l.id)) return false;
      const days = (new Date() - new Date(l.date))/(1000*60*60*24);
      return days >= 7;
    });
  },[state.roastLogs,state.cuppings]);

  const lowStock = useMemo(()=> state.products.filter(p=>p.stock <= state.settings.lowStockThreshold && p.visible), [state.products,state.settings]);

  const lang = state.settings.language || 'id';
  const t = useMemo(()=> makeT(lang), [lang]);

  // Current user (resolved from auth state)
  const currentUser = useMemo(()=>
    (state.auth?.users||[]).find(u=>u.id===state.auth?.currentUserId) || null,
  [state.auth]);
  const role = currentUser?.role || null;
  const perms = role ? getPerms(state.settings, role) : null;

  // Login / logout handlers
  const onLogin = useCallback((user)=>{
    setState(s => ({
      ...s,
      auth: {
        ...s.auth,
        currentUserId: user.id,
        sessionExpiry: Date.now()+1000*60*60*12,
        users: (s.auth.users||[]).map(u => u.id===user.id ? {...u, lastLogin:new Date().toISOString(), updatedAt:new Date().toISOString()} : u)
      }
    }));
    toast(`${t('signed_in_as')} ${user.displayName}`, 'ok');
  },[toast, t]);
  const onSetupAdmin = useCallback((user)=>{
    setState(s => ({
      ...s,
      auth: { users: [user], currentUserId: user.id, sessionExpiry: Date.now()+1000*60*60*12 }
    }));
    toast(t('user_created'),'ok');
  },[toast, t]);
  const onLogout = useCallback(()=>{
    setState(s => ({ ...s, auth: { ...s.auth, currentUserId: null, sessionExpiry: null }}));
    setPage('dashboard');
    toast(t('logout'),'ok');
  },[toast, t]);

  // Settlement state for today
  const todaysSettlement = useMemo(()=> todaySettlement(state.settlements||[]), [state.settlements]);
  const isDayLocked = useMemo(()=>{
    if(!state.settings.settlement?.enabled) return false;
    if(role !== 'pegawai') return false; // only pegawai gets locked
    if(!todaysSettlement) return true; // not yet opened
    if(todaysSettlement.status === 'closed') return true;
    if(todaysSettlement.status === 'pending' && state.settings.settlement?.lockOnPending) return true;
    return false;
  },[todaysSettlement, state.settings.settlement, role]);

  // Auto-trigger settlement cutoff (every minute check)
  useEffect(()=>{
    if(!state.settings.settlement?.enabled) return;
    const tick = setInterval(()=>{
      const now = new Date();
      const today = now.toISOString().slice(0,10);
      const hhmm = now.toTimeString().slice(0,5);
      if(hhmm >= (state.settings.settlement?.cutoffTime||'23:59')){
        const todays = todaySettlement(state.settlements||[]);
        if(todays && todays.status === 'open'){
          // Mark pending
          setState(s => ({
            ...s,
            settlements: s.settlements.map(x => x.id===todays.id ? {...x, status:'pending', updatedAt:new Date().toISOString()} : x)
          }));
        }
      }
    }, 60000);
    return ()=> clearInterval(tick);
  },[state.settings.settlement?.enabled, state.settings.settlement?.cutoffTime, state.settlements]);

  const ctx = {
    state, update, toast, pendingCuppings, lowStock, setPage,
    manualSync, triggerInstall, installAvailable, printerConnected,
    syncStatus: SyncSvc.status, syncError: SyncSvc.lastError, syncLastAt: SyncSvc.lastSyncAt,
    t, lang,
    currentUser, role, perms, onLogout,
    todaysSettlement, isDayLocked,
  };

  // === HOOKS BELOW MUST RUN UNCONDITIONALLY (before any early return) ===

  // Ensure current page is allowed for this role
  // (early-return inside callback is fine; hook itself must be called every render)
  useEffect(()=>{
    if(!currentUser) return;
    const pages = perms?.pages || [];
    if(pages.length && !pages.includes(page)){
      setPage(pages[0] || 'dashboard');
    }
  },[role, currentUser, page, perms]);

/* ============================================================
   ROAST LOG MODULE  — full F4 spec coverage
   ============================================================ */
function recommendArr(rec){
  if(Array.isArray(rec)) return rec;
  if(typeof rec==='string' && rec.trim()) return rec.split(',').map(x=>x.trim()).filter(Boolean);
  return [];
}
function computeDerived(l){
  const fc = +l.firstCrack||0, dt = +l.dropTime||0;
  const developmentTime = fc && dt && dt>fc ? +(dt-fc).toFixed(2) : null;
  const dtr = developmentTime && dt ? +((developmentTime/dt)*100).toFixed(1) : null;
  const bi = +l.batchSize||0, bo = +l.batchOut||0;
  const weightLoss = bi && bo && bi>bo ? +((bi-bo)/bi*100).toFixed(2) : null;
  return { developmentTime, dtr, weightLoss };
}

function RoastModule(){
  const { state, update, toast, pendingCuppings } = useApp();
  const [tab,setTab] = useState('history');
  const [editing,setEditing] = useState(null);
  const [cuppingFor,setCuppingFor] = useState(null);
  const [filterBean,setFilterBean] = useState('');
  const [filterLevel,setFilterLevel] = useState('');
  const [filterRoaster,setFilterRoaster] = useState('');
  const [filterProfile,setFilterProfile] = useState('');
  const [filterProcess,setFilterProcess] = useState('');
  const [sortBy,setSortBy] = useState('date');

  const cupBy = useMemo(()=> {
    const m={}; for(const c of state.cuppings) m[c.logId]=c; return m;
  },[state.cuppings]);

  const profiles = useMemo(()=> Array.from(new Set(state.roastLogs.map(l=>l.profile).filter(Boolean))), [state.roastLogs]);
  const processes = useMemo(()=> Array.from(new Set(state.beans.map(b=>b.process).filter(Boolean))), [state.beans]);

  const filtered = useMemo(()=>{
    let arr = [...state.roastLogs];
    if(filterBean) arr = arr.filter(l=>l.beanId===filterBean);
    if(filterLevel) arr = arr.filter(l=>l.roastLevel===filterLevel);
    if(filterRoaster) arr = arr.filter(l=>(l.roaster||'').toLowerCase().includes(filterRoaster.toLowerCase()));
    if(filterProfile) arr = arr.filter(l=>l.profile===filterProfile);
    if(filterProcess){
      arr = arr.filter(l=>{
        const b = state.beans.find(x=>x.id===l.beanId); return b?.process===filterProcess;
      });
    }
    if(sortBy==='date') arr.sort((a,b)=>b.date.localeCompare(a.date));
    if(sortBy==='score') arr.sort((a,b)=>((cupBy[b.id]?.score)||0)-((cupBy[a.id]?.score)||0));
    if(sortBy==='rating') arr.sort((a,b)=>((cupBy[b.id]?.rating)||0)-((cupBy[a.id]?.rating)||0));
    return arr;
  },[state.roastLogs,state.beans,filterBean,filterLevel,filterRoaster,filterProfile,filterProcess,sortBy,cupBy]);

  // Rec engine — per (bean name × process × roast level), score-based
  const recs = useMemo(()=>{
    const map={}; // key: beanId -> level -> {sum,n,logs}
    for(const l of state.roastLogs){
      const c = cupBy[l.id]; if(!c) continue;
      map[l.beanId] ??= {}; map[l.beanId][l.roastLevel] ??= {sum:0,n:0,logs:[],ratings:0};
      map[l.beanId][l.roastLevel].sum += c.score;
      map[l.beanId][l.roastLevel].n += 1;
      map[l.beanId][l.roastLevel].ratings += c.rating||0;
      map[l.beanId][l.roastLevel].logs.push(l.id);
    }
    const out=[];
    for(const bid of Object.keys(map)){
      const b = state.beans.find(x=>x.id===bid); if(!b) continue;
      // Best level
      let best=null;
      const levels=[];
      for(const lv of Object.keys(map[bid])){
        const e = map[bid][lv]; const avg=e.sum/e.n; const avgR=e.ratings/e.n;
        levels.push({level:lv,avg,avgR,n:e.n,logs:e.logs});
        if(!best || avg>best.avg) best={level:lv,avg,avgR,n:e.n,logs:e.logs};
      }
      out.push({bean:b, best, levels: levels.sort((a,b)=>b.avg-a.avg)});
    }
    return out.sort((a,b)=>b.best.avg-a.best.avg);
  },[state.roastLogs,state.beans,cupBy]);

  return (
    <div className="col gap-lg">
      <div className="tabs">
        <div className={"tab "+(tab==='history'?'active':'')} onClick={()=>setTab('history')}>History</div>
        <div className={"tab "+(tab==='new'?'active':'')} onClick={()=>{setEditing(null);setTab('new');}}>New Session</div>
        <div className={"tab "+(tab==='recommendations'?'active':'')} onClick={()=>setTab('recommendations')}>Rekomendasi</div>
        <div style={{flex:1}}/>
        {pendingCuppings.length>0 && (
          <div className="pill warn" style={{alignSelf:'center'}}><I name="bell" size={11}/>{pendingCuppings.length} cupping menunggu</div>
        )}
      </div>

      {tab==='history' && (
        <div className="col gap-md">
          <div className="row" style={{padding:'8px 0',borderBottom:'1px solid var(--border)',flexWrap:'wrap'}}>
            <I name="filter" size={14} color="var(--gold)"/>
            <select className="select" value={filterBean} onChange={e=>setFilterBean(e.target.value)} style={{maxWidth:180}}>
              <option value="">Semua Bean</option>
              {state.beans.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
            </select>
            <select className="select" value={filterProcess} onChange={e=>setFilterProcess(e.target.value)} style={{maxWidth:170}}>
              <option value="">Semua Proses</option>
              {processes.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
            <select className="select" value={filterLevel} onChange={e=>setFilterLevel(e.target.value)} style={{maxWidth:160}}>
              <option value="">Semua Level</option>
              {ROAST_LEVELS.map(l=><option key={l} value={l}>{l}</option>)}
            </select>
            <select className="select" value={filterProfile} onChange={e=>setFilterProfile(e.target.value)} style={{maxWidth:160}}>
              <option value="">Semua Profile</option>
              {profiles.map(p=><option key={p} value={p}>{p}</option>)}
            </select>
            <input className="input" placeholder="Roaster" value={filterRoaster} onChange={e=>setFilterRoaster(e.target.value)} style={{maxWidth:130}}/>
            <select className="select" value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{maxWidth:170}}>
              <option value="date">Sort: Terbaru</option>
              <option value="score">Sort: Skor Tertinggi</option>
              <option value="rating">Sort: Rating Tertinggi</option>
            </select>
            <div style={{flex:1}}/>
            <button className="btn primary" onClick={()=>{setEditing(null);setTab('new');}}><I name="plus" size={12}/>Session</button>
          </div>
          <div style={{overflowX:'auto'}}>
            <table className="tbl">
              <thead><tr>
                <th>Tanggal</th><th>Bean</th><th>Proses</th><th>Roaster</th><th>Level</th>
                <th>Profile</th><th>Batch In→Out</th><th>Loss%</th><th>1C → Drop</th>
                <th>DTR</th><th>Score</th><th>Rating</th><th></th>
              </tr></thead>
              <tbody>
                {filtered.map(l=>{
                  const c=cupBy[l.id];
                  const b=state.beans.find(x=>x.id===l.beanId);
                  const d=computeDerived(l);
                  return (
                    <tr key={l.id} className="clickable" onClick={()=>setEditing(l)}>
                      <td className="mono dim">{fmtDate(l.date)}{l.timeOfRoast?(<> <span className="tiny" style={{opacity:.5}}>{l.timeOfRoast}</span></>):null}</td>
                      <td className="bright" style={{fontFamily:'var(--display)',fontSize:17}}>{l.beanName}</td>
                      <td className="dim tiny">{b?.process||'—'}</td>
                      <td className="dim">{l.roaster||'—'}</td>
                      <td><span className="roast-pill" style={{'--bg':ROAST_COLORS[l.roastLevel]}}>{l.roastLevel}</span></td>
                      <td className="dim">{l.profile||'—'}</td>
                      <td className="mono dim">{l.batchSize||'—'}g{l.batchOut?<>→{l.batchOut}g</>:''}</td>
                      <td className="mono" style={{color: d.weightLoss?'var(--accent)':'var(--text-3)'}}>{d.weightLoss? d.weightLoss+'%':'—'}</td>
                      <td className="mono dim">{l.firstCrack||'—'}m → {l.dropTime||'—'}m · {l.dropTemp||'—'}°</td>
                      <td className="mono dim">{d.dtr? d.dtr+'%':'—'}</td>
                      <td className="mono" style={{color:'var(--accent)'}}>{c? c.score.toFixed(1) : <span className="muted">—</span>}</td>
                      <td>{c? <Stars value={c.rating} readOnly/> : <button className="btn sm" onClick={(e)=>{e.stopPropagation();setCuppingFor(l);}}>Cupping</button>}</td>
                      <td><button className="btn sm ghost icon" onClick={(e)=>{e.stopPropagation();setEditing(l);}}><I name="edit" size={13}/></button></td>
                    </tr>
                  );
                })}
                {filtered.length===0 && <tr><td colSpan={13} className="muted" style={{textAlign:'center',padding:40}}>Belum ada log roast.</td></tr>}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {tab==='new' && (
        <RoastSession initial={editing} onClose={()=>{setEditing(null);setTab('history');}}/>
      )}

      {tab==='recommendations' && (
        <div className="col gap-md">
          <div>
            <div className="eyebrow">Engine</div>
            <h3 style={{fontSize:'clamp(28px, 3.5vw, 38px)',margin:'10px 0'}}>Resep roasting <em>terbaik</em> per bean & proses</h3>
            <div className="dim" style={{maxWidth:600,lineHeight:1.65}}>Berdasarkan rata-rata cupping score (bukan taste notes). Dikelompokkan per nama bean dan proses, dengan roast level terbaik untuk masing-masing.</div>
          </div>
          {recs.length===0 ? <div className="muted">Belum cukup data cupping.</div> :
            <div className="grid-2 mt-md">
              {recs.map(r=>(
                <div key={r.bean.id} style={{padding:'24px 4px 24px 22px',borderLeft:'1px solid var(--gold)'}}>
                  <div className="label">{r.bean.origin} · {r.bean.process}</div>
                  <h3 style={{fontSize:30,margin:'10px 0 12px',color:'var(--text)'}}>{r.bean.name}</h3>
                  <div className="row mt-sm" style={{flexWrap:'wrap'}}>
                    <span className="roast-pill" style={{'--bg':ROAST_COLORS[r.best.level]}}>Best: {r.best.level}</span>
                    <span className="pill gold">★ {r.best.avg.toFixed(1)} · {r.best.n} sesi</span>
                    <span className="pill">Avg rating {r.best.avgR.toFixed(1)}/5</span>
                  </div>
                  {r.levels.length>1 && (
                    <div className="mt-md">
                      <div className="label" style={{opacity:.6}}>Level lain:</div>
                      <div className="row mt-sm" style={{flexWrap:'wrap',gap:8}}>
                        {r.levels.slice(1).map(lv=>(
                          <span key={lv.level} className="pill" title={lv.n+' sesi'}>{lv.level} · {lv.avg.toFixed(1)}</span>
                        ))}
                      </div>
                    </div>
                  )}
                  <div className="dim mt-md" style={{lineHeight:1.6,fontSize:13.5}}>{r.bean.notes}</div>
                </div>
              ))}
            </div>
          }
        </div>
      )}

      {editing && tab!=='new' && (
        <Modal title={'Roast · '+editing.beanName} onClose={()=>setEditing(null)} wide>
          <RoastSessionView log={editing} onCupping={()=>{ setCuppingFor(editing); }} onEdit={()=>{setTab('new');}}/>
        </Modal>
      )}

      {cuppingFor && (
        <CuppingModal log={cuppingFor} existing={cupBy[cuppingFor.id]} onClose={()=>setCuppingFor(null)}/>
      )}
    </div>
  );
}

function RoastSession({initial,onClose}){
  const { state, update, toast } = useApp();
  // Identitas
  const [bean,setBean] = useState(initial?.beanId || state.beans[0]?.id || '');
  const [date,setDate] = useState(initial?.date || todayISO());
  const [timeOfRoast,setTimeOfRoast] = useState(initial?.timeOfRoast || new Date().toTimeString().slice(0,5));
  const [roaster,setRoaster] = useState(initial?.roaster || '');
  // Resep
  const [level,setLevel] = useState(initial?.roastLevel || 'Medium');
  const [profile,setProfile] = useState(initial?.profile || '');
  const [batch,setBatch] = useState(initial?.batchSize || 1000);
  const [batchOut,setBatchOut] = useState(initial?.batchOut || '');
  // Kondisi awal
  const [chargeTemp,setChargeTemp] = useState(initial?.chargeTemp || '');
  const [ambientTemp,setAmbientTemp] = useState(initial?.ambientTemp || '');
  const [ambientHum,setAmbientHum] = useState(initial?.ambientHumidity || '');
  const [gasStart,setGasStart] = useState(initial?.gasStart || '');
  const [airflow,setAirflow] = useState(initial?.airflow || '');
  // Curve & milestones
  const [curve,setCurve] = useState(initial?.curve || []);
  const [tp,setTp] = useState(initial?.turningPoint || '');
  const [yp,setYp] = useState(initial?.yellowingPoint || '');
  const [fc,setFc] = useState(initial?.firstCrack || '');
  const [fcEnd,setFcEnd] = useState(initial?.firstCrackEnd || '');
  const [dropT,setDropT] = useState(initial?.dropTime || '');
  const [dropTemp,setDropTemp] = useState(initial?.dropTemp || '');
  // Catatan
  const [desc,setDesc] = useState(initial?.description || '');
  const [notes,setNotes] = useState(initial?.notes || '');
  const [recommendIds,setRecommendIds] = useState(()=> recommendArr(initial?.recommend));

  const [running,setRunning] = useState(false);
  const [elapsed,setElapsed] = useState(0);
  const [t1,setT1] = useState('');
  const [t2,setT2] = useState('');
  const tickRef = useRef(null);

  const beanObj = state.beans.find(b=>b.id===bean);

  // Auto-derived
  const developmentTime = fc && dropT && +dropT>+fc ? +(+dropT - +fc).toFixed(2) : null;
  const dtr = developmentTime && dropT ? +((developmentTime/+dropT)*100).toFixed(1) : null;
  const weightLoss = batch && batchOut && +batch>+batchOut ? +((+batch-+batchOut)/+batch*100).toFixed(2) : null;

  useEffect(()=>{
    if(running){ tickRef.current = setInterval(()=> setElapsed(e=>e+1), 1000); }
    return ()=> clearInterval(tickRef.current);
  },[running]);

  function recordPoint(){
    const t = +(elapsed/60).toFixed(2);
    const T1 = parseFloat(t1)||null, T2 = parseFloat(t2)||null;
    if(T1===null && T2===null){ toast('Isi T1/T2 dulu','warn'); return; }
    setCurve(c=> [...c.filter(p=>Math.abs(p.t-t)>0.05), {t,T1,T2}].sort((a,b)=>a.t-b.t));
    setT1('');setT2('');
  }

  function markMilestone(field, setter){
    const t = +(elapsed/60).toFixed(2);
    setter(t);
    toast(`${field} ditandai pada ${t}m`,'ok');
  }

  function saveLog(){
    const b = state.beans.find(x=>x.id===bean);
    if(!b){ toast('Pilih bean dulu','err'); return; }
    const log = {
      id: initial?.id || 'r'+Date.now(),
      beanId: bean, beanName: b.name, beanProcess: b.process,
      date, timeOfRoast, roaster,
      roastLevel: level, profile,
      batchSize: +batch||null, batchOut: +batchOut||null,
      chargeTemp: +chargeTemp||null,
      ambientTemp: +ambientTemp||null, ambientHumidity: +ambientHum||null,
      gasStart: +gasStart||null, airflow: +airflow||null,
      curve,
      turningPoint: +tp||null, yellowingPoint: +yp||null,
      firstCrack:+fc||null, firstCrackEnd:+fcEnd||null,
      dropTime:+dropT||null, dropTemp:+dropTemp||null,
      description: desc, notes,
      recommend: recommendIds,
    };
    // === INVENTORY SYNC: auto-deduct green bean qty (in kg) by batchSize ===
    const oldBatch = initial? (+initial.batchSize||0) : 0;
    const newBatch = +batch||0;
    const oldBeanId = initial?.beanId || null;
    const movements = [];
    update(s=>{
      let nextBeans = s.beans;
      // Restore old deduction (if editing)
      if(initial && oldBeanId){
        nextBeans = nextBeans.map(bn => bn.id===oldBeanId ? {...bn, qty: (+bn.qty||0) + oldBatch/1000} : bn);
      }
      // Apply new deduction
      nextBeans = nextBeans.map(bn => bn.id===bean ? {...bn, qty: Math.max(0, (+bn.qty||0) - newBatch/1000)} : bn);
      movements.push({
        id:'m'+Date.now(),
        type:'roast', beanId:bean, beanName:b.name,
        qty: -(newBatch/1000), unit:'kg', refId:log.id,
        at:new Date().toISOString(), by:state.auth?.currentUserId||null,
        note:`Roast ${log.profile||''} · ${newBatch}g`,
      });
      return {
        roastLogs: initial ? s.roastLogs.map(l=>l.id===log.id?log:l) : [log, ...s.roastLogs],
        beans: nextBeans,
        movements: [...movements, ...(s.movements||[])].slice(0,500),
      };
    });
    toast(initial?'Sesi diperbarui':`Sesi disimpan. ${(newBatch/1000).toFixed(2)} kg bean ${b.name} terkurangi otomatis.`, 'ok');
    onClose?.();
  }

  const chartRef = useRef(null), chartInst = useRef(null);
  useEffect(()=>{
    if(!chartRef.current) return;
    if(chartInst.current) chartInst.current.destroy();
    const labels = Array.from({length:25},(_,i)=>i+':00');
    const dataT1 = labels.map((_,i)=> curve.find(p=>Math.abs(p.t-i)<0.5)?.T1 ?? null);
    const dataT2 = labels.map((_,i)=> curve.find(p=>Math.abs(p.t-i)<0.5)?.T2 ?? null);
    // Milestone overlay points
    const milestonePts = [];
    if(tp) milestonePts.push({x:+tp+':00',y:dataT1[Math.round(+tp)] ?? 100, label:'TP'});
    chartInst.current = new Chart(chartRef.current,{
      type:'line',
      data:{ labels, datasets:[
        { label:'Beans Temp T1', data:dataT1, borderColor:'#5a0f1a', backgroundColor:'rgba(90,15,26,.10)', tension:.35, spanGaps:true, pointRadius:2.5, pointBackgroundColor:'#5a0f1a', borderWidth:2 },
        { label:'Drum Temp T2', data:dataT2, borderColor:'#7a5d1c', backgroundColor:'rgba(122,93,28,.06)', tension:.35, spanGaps:true, pointRadius:2.5, pointBackgroundColor:'#7a5d1c', borderWidth:1.6, borderDash:[5,4] }
      ]},
      options:{
        responsive:true, maintainAspectRatio:false, animation:{duration:400, easing:'easeOutQuart'},
        plugins:{ legend:{ labels:{ color:'#3d2d20', font:{family:'Inter',size:11,weight:'500'}, usePointStyle:true } } },
        scales:{
          x:{ title:{display:true,text:'Time — minutes', color:'#5a0f1a', font:{family:'JetBrains Mono',size:10,weight:'600'}}, ticks:{color:'#7a6a55',font:{family:'JetBrains Mono',size:10}}, grid:{color:'rgba(10,6,6,.08)'} },
          y:{ min:0,max:230, title:{display:true,text:'Temperature °C',color:'#5a0f1a',font:{family:'JetBrains Mono',size:10,weight:'600'}}, ticks:{color:'#7a6a55',font:{family:'JetBrains Mono',size:10},stepSize:10}, grid:{color:'rgba(10,6,6,.08)'} }
        }
      }
    });
  },[curve,tp]);

  function fmtElapsed(s){ const m=Math.floor(s/60), ss=s%60; return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`; }

  // Recommendable products (visible roast beans + fallen liquid)
  const recProducts = state.products.filter(p=>p.visible);

  return (
    <div className="col gap-lg">
      <div>
        <div className="sec-mark"><span className="label">N° 01 — Identitas</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>{initial? <>Edit <em>session</em></> : <>Sesi <em>baru</em></>}</h3>
        <div className="grid-3">
          <div className="field"><label>Bean</label>
            <select className="select" value={bean} onChange={e=>setBean(e.target.value)}>
              {state.beans.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
            </select>
          </div>
          <div className="field"><label>Proses (auto)</label><input className="input" value={beanObj?.process||'—'} readOnly/></div>
          <div className="field"><label>Origin (auto)</label><input className="input" value={beanObj?.origin||'—'} readOnly/></div>
          <div className="field"><label>Tanggal</label><input className="input" type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
          <div className="field"><label>Jam Roast</label><input className="input" type="time" value={timeOfRoast} onChange={e=>setTimeOfRoast(e.target.value)}/></div>
          <div className="field"><label>Roaster</label><input className="input" value={roaster} onChange={e=>setRoaster(e.target.value)} placeholder="Nama operator"/></div>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 02 — Resep & Kondisi</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>Resep <em>baru</em></h3>
        <div className="grid-3">
          <div className="field"><label>Roast Level</label>
            <select className="select" value={level} onChange={e=>setLevel(e.target.value)}>
              {ROAST_LEVELS.map(l=><option key={l}>{l}</option>)}
            </select>
          </div>
          <div className="field"><label>Nama Profile</label><input className="input" value={profile} onChange={e=>setProfile(e.target.value)} placeholder="Standard Med, Wine Light, dll"/></div>
          <div className="field"><label>Batch In (gr)</label><input className="input mono" type="number" value={batch} onChange={e=>setBatch(e.target.value)}/></div>
          <div className="field"><label>Batch Out (gr)</label><input className="input mono" type="number" value={batchOut} onChange={e=>setBatchOut(e.target.value)} placeholder="Berat setelah roast"/></div>
          <div className="field"><label>Weight Loss (auto)</label><input className="input mono" value={weightLoss? weightLoss+'%':'—'} readOnly/></div>
          <div className="field"><label>Charge Temp (°C)</label><input className="input mono" type="number" value={chargeTemp} onChange={e=>setChargeTemp(e.target.value)} placeholder="200"/></div>
          <div className="field"><label>Ambient Temp (°C)</label><input className="input mono" type="number" value={ambientTemp} onChange={e=>setAmbientTemp(e.target.value)} placeholder="28"/></div>
          <div className="field"><label>Humidity (%)</label><input className="input mono" type="number" value={ambientHum} onChange={e=>setAmbientHum(e.target.value)} placeholder="65"/></div>
          <div className="field"><label>Gas Start (%)</label><input className="input mono" type="number" value={gasStart} onChange={e=>setGasStart(e.target.value)} placeholder="60"/></div>
          <div className="field"><label>Airflow (%)</label><input className="input mono" type="number" value={airflow} onChange={e=>setAirflow(e.target.value)} placeholder="50"/></div>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 03 — Live Curve (F4 Template)</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>Roast Profile <em>Recorder</em></h3>
        <div className="row mb-md" style={{justifyContent:'space-between',flexWrap:'wrap'}}>
          <div className="row">
            <button className={"btn "+(running?'danger':'primary')} onClick={()=>setRunning(r=>!r)}>
              <I name={running?'pause':'play'} size={12}/>{running?'Pause':'Start'}
            </button>
            <button className="btn ghost" onClick={()=>{setRunning(false);setElapsed(0);}}><I name="stop" size={12}/>Reset</button>
            <div className="mono" style={{fontSize:26,color:'var(--accent)',marginLeft:18,letterSpacing:'.05em'}}>{fmtElapsed(elapsed)}</div>
          </div>
          <div className="row">
            <div className="field" style={{minWidth:88}}><label>T1 °C</label><input className="input mono" value={t1} onChange={e=>setT1(e.target.value)} placeholder="165"/></div>
            <div className="field" style={{minWidth:88}}><label>T2 °C</label><input className="input mono" value={t2} onChange={e=>setT2(e.target.value)} placeholder="210"/></div>
            <button className="btn primary" onClick={recordPoint} style={{marginTop:20}}><I name="plus" size={12}/>Record</button>
          </div>
        </div>
        <div className="row mb-md" style={{gap:8,flexWrap:'wrap'}}>
          <span className="label" style={{opacity:.7}}>Mark milestone (timer berjalan):</span>
          <button className="btn sm ghost" onClick={()=>markMilestone('Turning Point', setTp)}>TP</button>
          <button className="btn sm ghost" onClick={()=>markMilestone('Yellowing', setYp)}>Yellowing</button>
          <button className="btn sm ghost" onClick={()=>markMilestone('1C Start', setFc)}>1C Start</button>
          <button className="btn sm ghost" onClick={()=>markMilestone('1C End', setFcEnd)}>1C End</button>
          <button className="btn sm ghost" onClick={()=>markMilestone('Drop', setDropT)}>Drop</button>
        </div>
        <div className="curve-wrap" style={{height:380}}>
          <canvas ref={chartRef}/>
        </div>
        {curve.length>0 && (
          <div className="row mt-md" style={{justifyContent:'space-between'}}>
            <span className="tiny dim">{curve.length} titik tercatat</span>
            <button className="btn sm ghost" onClick={()=>{ if(confirm('Hapus semua titik kurva?')) setCurve([]); }}><I name="trash" size={11}/>Clear curve</button>
          </div>
        )}
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 04 — Milestones</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>Titik <em>kunci</em></h3>
        <div className="grid-4">
          <div className="field"><label>Turning Point (min)</label><input className="input mono" value={tp} onChange={e=>setTp(e.target.value)} placeholder="1.5"/></div>
          <div className="field"><label>Yellowing (min)</label><input className="input mono" value={yp} onChange={e=>setYp(e.target.value)} placeholder="5.0"/></div>
          <div className="field"><label>First Crack Start (min)</label><input className="input mono" value={fc} onChange={e=>setFc(e.target.value)} placeholder="9.5"/></div>
          <div className="field"><label>First Crack End (min)</label><input className="input mono" value={fcEnd} onChange={e=>setFcEnd(e.target.value)} placeholder="11.0"/></div>
          <div className="field"><label>Drop Time (min)</label><input className="input mono" value={dropT} onChange={e=>setDropT(e.target.value)} placeholder="14.0"/></div>
          <div className="field"><label>Drop Temp (°C)</label><input className="input mono" value={dropTemp} onChange={e=>setDropTemp(e.target.value)} placeholder="208"/></div>
          <div className="field"><label>Development Time (auto)</label><input className="input mono" value={developmentTime? developmentTime+' min':'—'} readOnly/></div>
          <div className="field"><label>DTR (auto)</label><input className="input mono" value={dtr? dtr+'%':'—'} readOnly/></div>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 05 — Catatan</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>Deskripsi & <em>Rekomendasi</em></h3>
        <div className="grid-2">
          <div className="field"><label>Description (F4 box)</label><textarea className="input" value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Catatan profil, perubahan gas, warna akhir, dll." style={{minHeight:110}}/></div>
          <div className="field"><label>Notes</label><textarea className="input" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Observasi lain, anomali, gas ramp, airflow change, dll." style={{minHeight:110}}/></div>
        </div>
        <div className="field mt-md"><label>Rekomendasi untuk Produk · pilih nama</label>
          <div className="row" style={{flexWrap:'wrap',gap:8,marginTop:6}}>
            {recProducts.map(p=>{
              const on = recommendIds.includes(p.id);
              return (
                <button key={p.id} type="button" className={"btn sm "+(on?'primary':'ghost')} style={{textTransform:'none',letterSpacing:'.04em',fontFamily:'var(--sans)',fontSize:12}}
                  onClick={()=> setRecommendIds(on? recommendIds.filter(x=>x!==p.id) : [...recommendIds, p.id])}>
                  {on && <I name="check" size={11}/>}{p.name}
                </button>
              );
            })}
            {recProducts.length===0 && <span className="muted tiny">Belum ada produk di Inventory.</span>}
          </div>
          {recommendIds.length>0 && <div className="tiny dim mt-sm">{recommendIds.length} produk dipilih.</div>}
        </div>
      </div>

      <div className="row" style={{justifyContent:'flex-end',paddingTop:14,borderTop:'1px solid var(--border)'}}>
        <button className="btn ghost" onClick={onClose}>Batal</button>
        <button className="btn primary" onClick={saveLog}><I name="check" size={12}/>{initial?'Update':'Simpan'} Session</button>
      </div>
    </div>
  );
}

function RoastSessionView({log,onCupping,onEdit}){
  const { state } = useApp();
  const chartRef = useRef(null);
  const bean = state.beans.find(b=>b.id===log.beanId);
  const d = computeDerived(log);
  const recIds = recommendArr(log.recommend);
  const recProds = recIds.map(id=> state.products.find(p=>p.id===id)).filter(Boolean);

  useEffect(()=>{
    if(!chartRef.current) return;
    const labels = Array.from({length:25},(_,i)=>i+':00');
    const t1 = labels.map((_,i)=> log.curve.find(p=>Math.abs(p.t-i)<0.5)?.T1 ?? null);
    const t2 = labels.map((_,i)=> log.curve.find(p=>Math.abs(p.t-i)<0.5)?.T2 ?? null);
    const c = new Chart(chartRef.current,{type:'line',data:{labels,datasets:[
      {label:'Beans Temp T1',data:t1,borderColor:'#5a0f1a',backgroundColor:'rgba(90,15,26,.10)',tension:.35,pointRadius:2,borderWidth:2,spanGaps:true,pointBackgroundColor:'#5a0f1a'},
      {label:'Drum Temp T2',data:t2,borderColor:'#7a5d1c',backgroundColor:'rgba(122,93,28,.06)',tension:.35,pointRadius:2,borderWidth:1.6,borderDash:[5,4],spanGaps:true,pointBackgroundColor:'#7a5d1c'}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#3d2d20',font:{family:'Inter',size:11,weight:'500'},usePointStyle:true}}},scales:{x:{title:{display:true,text:'Time — minutes',color:'#5a0f1a',font:{family:'JetBrains Mono',size:10,weight:'600'}},ticks:{color:'#7a6a55',font:{family:'JetBrains Mono'}},grid:{color:'rgba(10,6,6,.08)'}},y:{min:0,max:230,title:{display:true,text:'Temperature °C',color:'#5a0f1a',font:{family:'JetBrains Mono',size:10,weight:'600'}},ticks:{color:'#7a6a55',font:{family:'JetBrains Mono'},stepSize:10},grid:{color:'rgba(10,6,6,.08)'}}}}});
    return ()=>c.destroy();
  },[log]);

  return (
    <div className="col gap-lg">
      <div>
        <div className="label">Identitas</div>
        <div className="grid-3 mt-md">
          <Fact label="Tanggal" v={fmtDate(log.date)+(log.timeOfRoast?(' · '+log.timeOfRoast):'')}/>
          <Fact label="Roaster" v={log.roaster||'—'}/>
          <Fact label="Bean" v={log.beanName}/>
          <Fact label="Proses" v={log.beanProcess || bean?.process || '—'}/>
          <Fact label="Origin" v={bean?.origin||'—'}/>
          <Fact label="Harvest" v={bean?.harvest||'—'}/>
        </div>
      </div>

      <div>
        <div className="label">Resep & Kondisi</div>
        <div className="grid-4 mt-md">
          <Fact label="Roast Level" v={<span className="roast-pill" style={{'--bg':ROAST_COLORS[log.roastLevel]}}>{log.roastLevel}</span>}/>
          <Fact label="Profile" v={log.profile||'—'}/>
          <Fact label="Batch In" v={(log.batchSize||'—')+'g'}/>
          <Fact label="Batch Out" v={log.batchOut?(log.batchOut+'g'):'—'}/>
          <Fact label="Weight Loss" v={d.weightLoss? <span style={{color:'var(--accent)'}}>{d.weightLoss}%</span> : '—'}/>
          <Fact label="Charge Temp" v={log.chargeTemp?(log.chargeTemp+'°C'):'—'}/>
          <Fact label="Ambient" v={(log.ambientTemp?log.ambientTemp+'°C':'—')+(log.ambientHumidity?' · '+log.ambientHumidity+'%':'')}/>
          <Fact label="Gas · Airflow" v={(log.gasStart?log.gasStart+'%':'—')+' · '+(log.airflow?log.airflow+'%':'—')}/>
        </div>
      </div>

      <div>
        <div className="label">Kurva F4 — T1 (Beans) · T2 (Drum)</div>
        <div className="curve-wrap mt-md" style={{height:320}}><canvas ref={chartRef}/></div>
      </div>

      <div>
        <div className="label">Milestones</div>
        <div className="grid-4 mt-md">

        <svg key={n} className={"star "+(n<=value?'on':'')} viewBox="0 0 24 24" fill="currentColor"

          <path d="M12 2l3 7h7l-5.5 4.5L18 21l-6-4-6 4 1.5-7.5L2 9h7z"/>
        </svg>

function Fact({label,v}){

function Modal({title,children,onClose,wide,footer}){
  useEffect(()=>{
    const h=e=>{ if(e.key==='Escape') onClose?.(); };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[onClose]);
  return (
    <div className="modal-back" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()} style={wide?{maxWidth:1100}:{}}>
        <div className="modal-h">
          <h2>{title}</h2>
          <div className="close" onClick={onClose}><I name="close"/></div>
        </div>
        <div className="modal-b">{children}</div>
        {footer && <div className="modal-f">{footer}</div>}
      </div>
    </div>
  );
}
