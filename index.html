function ProductEditor({product, onClose}){
  const { state, update, toast } = useApp();
  const isNew = product._new;
  const [origin,setOrigin] = useState(product.origin || 'single');
  const [mixWith,setMixWith] = useState(product.mixWith || []);
  const [beanId,setBeanId] = useState(product.beanId || state.beans[0]?.id);
  const [name,setName] = useState(product.name || '');
  const [brand,setBrand] = useState(product.brand || 'Taring Naga Roastery');
  const [category,setCategory] = useState(product.category || 'Roast Beans');
  const [roastLevel,setRoastLevel] = useState(product.roastLevel || 'Medium');
  const [weight,setWeight] = useState(product.weight || 200);
  const [diskon,setDiskon] = useState(product.diskon || 0);
  const [stock,setStock] = useState(product.stock || 0);
  const [visible,setVisible] = useState(product.visible ?? true);
  const [tasting,setTasting] = useState(product.tastingNotes || '');
  const [markup,setMarkup] = useState(state.settings.markupPct);
  const [hargaOverride,setHargaOverride] = useState(product.harga || 0);

  const bean = state.beans.find(b=>b.id===beanId);
  const pricing = useMemo(()=> computePricing(bean, +weight, state.settings, +markup), [bean,weight,state.settings,markup]);

  useEffect(()=>{
    if(isNew && !hargaOverride && pricing.roundUp){ setHargaOverride(pricing.roundUp); }
  },[pricing.roundUp]);

  const finalPrice = Math.max(0, (+hargaOverride||0) - (+diskon||0));

  function generateSKU(){
    const b = state.beans.find(x=>x.id===beanId);
    const code = (b?.name||'XX').split(' ').map(s=>s.slice(0,3).toUpperCase()).slice(0,2).join('-');
    const lvl = roastLevel.slice(0,3).toUpperCase();
    return `TN-${code}-${lvl}-${weight}`;
  }

  function save(){
    const sku = product.sku || generateSKU();
    const p = {
      id: product.id || 'p'+Date.now(),
      sku, name: name || `${bean?.name||''} ${weight}g`,
      brand, category, beanId, roastLevel, weight:+weight,
      harga:+hargaOverride, hargaFinal: finalPrice, diskon:+diskon,
      stock:+stock, visible, tastingNotes: tasting,
      mixWith, origin
    };
    update(s=>({
      products: isNew ? [p, ...s.products] : s.products.map(x=>x.id===p.id?p:x)
    }));
    toast(isNew?'Produk ditambahkan':'Produk diperbarui','ok');
    onClose();
  }

  function del(){
    if(!confirm('Hapus produk ini?')) return;
    update(s=>({ products: s.products.filter(p=>p.id!==product.id) }));
    toast('Produk dihapus','ok');
    onClose();
  }

  return (
    <Modal title={isNew?'Produk Baru':<><em>{product.name}</em></>} onClose={onClose} wide
      footer={<>
        {!isNew && <button className="btn danger" onClick={del}><I name="trash" size={11}/>Delete</button>}
        <div style={{flex:1}}/>
        <button className="btn ghost" onClick={onClose}>Batal</button>
        <button className="btn primary" onClick={save}><I name="check" size={12}/>{isNew?'Tambahkan':'Simpan'}</button>
      </>}>
      <div className="col gap-lg">
        <div>
          <div className="label">N° 01 — Info Dasar</div>
          <div className="grid-3 mt-md">
            <div className="field"><label>Nama Produk</label><input className="input" value={name} onChange={e=>setName(e.target.value)} placeholder="Auto dari bean + berat"/></div>
            <div className="field"><label>SKU</label><input className="input mono" value={product.sku || generateSKU()} readOnly/></div>
            <div className="field"><label>Brand</label>
              <select className="select" value={brand} onChange={e=>setBrand(e.target.value)}>
                <option>Taring Naga Roastery</option>
                <option>Fallen Liquid</option>
              </select>
            </div>
            <div className="field"><label>Kategori</label>
              <select className="select" value={category} onChange={e=>setCategory(e.target.value)}>
                <option>Green Beans</option><option>Roast Beans</option><option>Fallen Liquid</option>
              </select>
            </div>
            <div className="field"><label>Variant Origin</label>
              <select className="select" value={origin} onChange={e=>setOrigin(e.target.value)}>
                <option value="single">Single Origin</option>
                <option value="mix">Mix / Blend</option>
              </select>
            </div>
            <div className="field"><label>Visibility</label>
              <label className="checkbox" style={{marginTop:10}}>
                <input type="checkbox" checked={visible} onChange={e=>setVisible(e.target.checked)}/> Tampilkan di POS/Web
              </label>
            </div>
          </div>
        </div>

        <div>
          <div className="label">N° 02 — Detail Kopi</div>
          {origin==='single' ? (
            <div className="grid-3 mt-md">
              <div className="field"><label>Bean (Single)</label>
                <select className="select" value={beanId} onChange={e=>setBeanId(e.target.value)}>
                  {state.beans.map(b=><option key={b.id} value={b.id}>{b.name}</option>)}
                </select>
              </div>
              <div className="field"><label>Process</label><input className="input" value={bean?.process||'—'} readOnly/></div>
              <div className="field"><label>Altitude</label><input className="input" value={bean?.altitude||'—'} readOnly/></div>
              <div className="field"><label>Harvest</label><input className="input" value={bean?.harvest||'—'} readOnly/></div>
              <div className="field"><label>Roast Level</label>
                <select className="select" value={roastLevel} onChange={e=>setRoastLevel(e.target.value)}>
                  {[...ROAST_LEVELS,'—'].map(l=><option key={l}>{l}</option>)}
                </select>
              </div>
              <div className="field"><label>Berat (gram)</label><input className="input mono" type="number" value={weight} onChange={e=>setWeight(e.target.value)}/></div>
            </div>
          ) : (
            <div className="col mt-md">
              <div className="field"><label>Pilih beans untuk blend (maks 3)</label>
                <div className="row" style={{flexWrap:'wrap',marginTop:6}}>
                  {state.beans.map(b=>{
                    const on = mixWith.includes(b.id);
                    return (
                      <div key={b.id} className="checkbox">
                        <input type="checkbox" checked={on} onChange={()=>{
                          if(on) setMixWith(mixWith.filter(x=>x!==b.id));
                          else if(mixWith.length<3) setMixWith([...mixWith,b.id]);
                        }}/>
                        {b.name}
                      </div>
                    );
                  })}
                </div>
              </div>
              <div className="grid-3">
                <div className="field"><label>Roast Level</label>
                  <select className="select" value={roastLevel} onChange={e=>setRoastLevel(e.target.value)}>
                    {[...ROAST_LEVELS,'—'].map(l=><option key={l}>{l}</option>)}
                  </select>
                </div>
                <div className="field"><label>Berat (gram)</label><input className="input mono" type="number" value={weight} onChange={e=>setWeight(e.target.value)}/></div>
              </div>
            </div>
          )}
        </div>

        <div>
          <div className="label">N° 03 — Harga & Stock</div>
          <div className="grid-3 mt-md">
            <Fact label="Harga Bean / Kg" v={fmtIDR(bean?.hargaBeli||0)}/>
            <Fact label="Susut" v={((bean?.susut??0)*100).toFixed(0)+'%'}/>
            <Fact label="Total Cost / Kg" v={fmtIDR(pricing.totalCostPerKg)}/>
            <Fact label="Bean Cost / Pack" v={fmtIDR(pricing.beanCost)}/>
            <Fact label={`+ Packaging+Sticker+Roasting`} v={fmtIDR(state.settings.packagingCost+state.settings.stickerCost+state.settings.roastingFee)}/>
            <Fact label="HPP" v={<span style={{color:'var(--accent)'}}>{fmtIDR(pricing.hpp)}</span>}/>
          </div>
          <div className="grid-4 mt-md">
            <div className="field"><label>Markup %</label><input className="input mono" type="number" value={markup} onChange={e=>setMarkup(e.target.value)}/></div>
            <Fact label="Harga (markup)" v={fmtIDR(pricing.baseSell)}/>
            <Fact label="Round-up" v={<span style={{color:'var(--accent)'}}>{fmtIDR(pricing.roundUp)}</span>}/>
            <div className="field"><label>Harga Jual (override)</label><input className="input mono" type="number" value={hargaOverride} onChange={e=>setHargaOverride(e.target.value)}/></div>
            <div className="field"><label>Diskon (Rp)</label><input className="input mono" type="number" value={diskon} onChange={e=>setDiskon(e.target.value)}/></div>
            <Fact label="Harga Final" v={<span style={{color:'var(--accent)',fontSize:20,fontFamily:'var(--display)'}}>{fmtIDR(finalPrice)}</span>}/>
            <div className="field"><label>Stock</label><input className="input mono" type="number" value={stock} onChange={e=>setStock(e.target.value)}/></div>
            <Fact label="Margin" v={<span style={{color:'var(--text)'}}>{fmtIDR(finalPrice - pricing.hpp)} · {pricing.hpp>0?((finalPrice-pricing.hpp)/finalPrice*100).toFixed(1):0}%</span>}/>
          </div>
        </div>

        <div>
          <div className="label">N° 04 — Deskripsi</div>
          <div className="field mt-md"><label>Tasting Notes</label><textarea className="input" value={tasting} onChange={e=>setTasting(e.target.value)} placeholder="Citrus, milk chocolate, brown sugar..."/></div>
        </div>
      </div>
    </Modal>
  );

function BeanEditor({bean,onClose}){
  const { state, update, toast, t } = useApp();
  const isNew = bean._new;
  const [b,setB] = useState({...bean, susut: bean.susut ?? 0.2});
  const [autoRecalc,setAutoRecalc] = useState(true);
  function set(k,v){ setB(s=>({...s,[k]:v})); }
  function save(){
    const final = {...b, id: b.id || 'b'+Date.now(), hargaBeli:+b.hargaBeli, susut:+b.susut, qty:+b.qty};
    const oldHarga = bean.hargaBeli;
    const oldSusut = bean.susut;
    const priceChanged = !isNew && (final.hargaBeli !== oldHarga || final.susut !== oldSusut);
    update(s=>{
      const beans = isNew ? [...s.beans, final] : s.beans.map(x=>x.id===final.id?x===bean?final:final:x);
      let products = s.products;
      // === INVENTORY SYNC: auto-recalc product prices using this bean ===
      if(priceChanged && autoRecalc){
        const affected = s.products.filter(p=>p.beanId===final.id || (p.mixWith||[]).includes(final.id));
        if(affected.length){
          products = s.products.map(p => {
            if(p.beanId!==final.id && !(p.mixWith||[]).includes(final.id)) return p;
            const pricing = computePricing(final, p.weight, s.settings, s.settings.markupPct);
            // Update harga to new round-up; keep diskon
            const newHarga = pricing.roundUp;
            const newFinal = Math.max(0, newHarga - (+p.diskon||0));
            return { ...p, harga: newHarga, hargaFinal: newFinal };
          });
        }
      }
      return { beans, products };
    });
    let msg = isNew?'Bean ditambahkan':'Bean diperbarui';
    if(priceChanged && autoRecalc){
      const affected = state.products.filter(p=>p.beanId===final.id || (p.mixWith||[]).includes(final.id));
      if(affected.length) msg += ` · Harga ${affected.length} produk ter-recalc otomatis.`;
    }
    toast(msg,'ok');
    onClose();
  }
  return (
    <Modal title={isNew?'Bean Baru':<><em>{bean.name}</em></>} onClose={onClose}
      footer={<>
        <div style={{flex:1}}/>
        <button className="btn ghost" onClick={onClose}>Batal</button>
        <button className="btn primary" onClick={save}>{isNew?'Tambahkan':'Simpan'}</button>
      </>}>
      <div className="grid-2">
        <div className="field"><label>Nama</label><input className="input" value={b.name} onChange={e=>set('name',e.target.value)}/></div>
        <div className="field"><label>Origin</label><input className="input" value={b.origin||''} onChange={e=>set('origin',e.target.value)}/></div>
        <div className="field"><label>Process</label><input className="input" value={b.process||''} onChange={e=>set('process',e.target.value)}/></div>

function StockOpname(){
  const { state, update, toast } = useApp();
  const [draft,setDraft] = useState(()=>Object.fromEntries(state.products.map(p=>[p.id, p.stock])));
  const [checked,setChecked] = useState({});

  function commit(){
    const changed = Object.keys(draft).filter(id=> draft[id] !== state.products.find(p=>p.id===id)?.stock);
    if(changed.length===0){ toast('Tidak ada perubahan stok','warn'); return; }
    update(s=>({ products: s.products.map(p=> draft[p.id]!=null ? {...p, stock:+draft[p.id]} : p) }));
    toast(`Opname tersimpan. ${changed.length} produk diperbarui.`,'ok');
  }

  return (
    <div className="col gap-md">
      <div className="row" style={{padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
        <div className="label">Audit Stok</div>
        <div style={{flex:1}}/>
        <button className="btn primary" onClick={commit}><I name="check" size={12}/>Commit Opname</button>
      </div>
      <table className="tbl">
        <thead><tr><th>✓</th><th>Produk</th><th>Sistem</th><th>Fisik</th><th>Selisih</th></tr></thead>
        <tbody>
          {state.products.map(p=>{
            const sel = +draft[p.id]||0; const diff = sel - p.stock;
            return (
              <tr key={p.id}>
                <td><label className="checkbox"><input type="checkbox" checked={!!checked[p.id]} onChange={e=>setChecked({...checked,[p.id]:e.target.checked})}/></label></td>
                <td style={{fontFamily:'var(--display)',fontSize:17,color:'var(--text)'}}>{p.name} <span className="tiny dim mono" style={{fontFamily:'var(--mono)',fontSize:11}}>· {p.sku}</span></td>
                <td className="mono dim">{p.stock}</td>
                <td><input className="input mono" type="number" value={draft[p.id]} onChange={e=>setDraft({...draft,[p.id]:e.target.value})} style={{maxWidth:90}}/></td>
                <td className="mono" style={{color: diff===0?'var(--text-3)': diff>0?'var(--ok)':'var(--danger)'}}>{diff>0?'+':''}{diff}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

function POSModule(){
  const { state, update, toast, t, isDayLocked, setPage } = useApp();

  // === ALL HOOKS MUST RUN BEFORE ANY CONDITIONAL RETURN ===
  const [cart,setCart] = useState([]);
  const [customer,setCustomer] = useState('');
  const [channel,setChannel] = useState('Walk-in');
  const [search,setSearch] = useState('');
  const [catFilter,setCatFilter] = useState('');
  const [paymentOpen,setPaymentOpen] = useState(false);
  const [lastOrder,setLastOrder] = useState(null);
  const [cartOpen,setCartOpen] = useState(false);

  if(isDayLocked){
    return (
      <div className="col gap-lg" style={{maxWidth:560,margin:'40px auto',textAlign:'center'}}>
        <div style={{margin:'30px auto 10px'}}><I name="info" size={56} color="var(--accent)"/></div>
        <div className="label">{t('pos_locked')}</div>
        <h2 style={{fontSize:'clamp(28px, 4vw, 42px)',color:'var(--accent)'}}>{t('pos_locked')}</h2>
        <div className="dim" style={{lineHeight:1.7}}>{t('pos_locked_msg')}</div>
        <div className="row" style={{justifyContent:'center',marginTop:16}}>
          <button className="btn" onClick={()=>setPage('settlement')}>
            <I name="book" size={12}/>{t('settlement')}
          </button>
        </div>
      </div>
    );
  }

  // Close cart on Escape (mobile sheet UX)
  useEffect(()=>{
    if(!cartOpen) return;
    const h = e => { if(e.key==='Escape') setCartOpen(false); };
    window.addEventListener('keydown', h);
    return ()=> window.removeEventListener('keydown', h);
  },[cartOpen]);

  const visible = state.products.filter(p=>p.visible && p.stock>0
    && (catFilter? p.category===catFilter : true)
    && (search? p.name.toLowerCase().includes(search.toLowerCase()) : true));

  function add(p){
    setCart(c=>{
      const ex = c.find(x=>x.productId===p.id);
      if(ex) return c.map(x=>x.productId===p.id?{...x,qty:x.qty+1}:x);
      return [...c, {productId:p.id, name:p.name, price:p.hargaFinal, qty:1}];
    });
  }
  function setQty(id,q){
    if(q<=0) return setCart(c=>c.filter(x=>x.productId!==id));
    setCart(c=>c.map(x=>x.productId===id?{...x,qty:q}:x));
  }
  const subtotal = cart.reduce((s,x)=>s+x.price*x.qty,0);

  function checkout(){
    if(cart.length===0){ toast('Cart kosong','warn'); return; }
    setPaymentOpen(true);
  }

  async function completeOrder(paid, paymentMethod='Cash'){
    const o = {
      id:'o'+Date.now(), date:todayISO(),
      time: new Date().toTimeString().slice(0,5),
      items: cart.map(c=>({...c, subtotal: c.price*c.qty})),
      total: subtotal, paid, paymentMethod, channel, customer: customer||'Walk-in', status:'paid'
    };
    update(s=>({
      orders:[o, ...s.orders],
      products: s.products.map(p=>{
        const cit = cart.find(c=>c.productId===p.id);
        return cit ? {...p, stock: Math.max(0, p.stock - cit.qty)} : p;
      })
    }));
    setLastOrder(o);
    setCart([]); setCustomer(''); setPaymentOpen(false);
    toast(`Order tersimpan · ${fmtIDR(subtotal)} · Notif ke ${state.settings.waGroup}`,'ok');
    // Auto print to thermal printer if connected
    if(state.settings.printerAutoPrint && printerSingleton.connected){
      try{
        await printerSingleton.send(buildReceiptBytes(o, state.settings, state.settings.printerWidth||32));
        toast('Struk terkirim ke printer','ok');
      }catch(err){
        toast('Print thermal gagal: '+err.message+' — pakai browser print','warn');
      }
    }
  }

  return (
    <>
    <div className="pos-grid">
      <div>
        <div className="row mb-md" style={{padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
          <I name="search" size={14} color="var(--gold)"/>
          <input className="input" placeholder="Cari menu…" value={search} onChange={e=>setSearch(e.target.value)} style={{flex:1,minWidth:160}}/>
          <select className="select" value={catFilter} onChange={e=>setCatFilter(e.target.value)} style={{maxWidth:160}}>
            <option value="">Semua</option>
            <option>Roast Beans</option><option>Green Beans</option><option>Fallen Liquid</option>
          </select>
          <select className="select" value={channel} onChange={e=>setChannel(e.target.value)} style={{maxWidth:160}}>
            <option>Walk-in</option><option>App</option><option>Web</option><option>Wholesale</option>
          </select>
        </div>
        <div className="menu-grid">
          {visible.map(p=>(
            <div key={p.id} className="menu-tile" onClick={()=>add(p)}>
              <div className="meta">{p.category} · {p.weight}g</div>
              <div className="name">{p.name}</div>
              {p.roastLevel!=='—' && <span className="roast-pill" style={{'--bg':ROAST_COLORS[p.roastLevel],marginTop:6}}>{p.roastLevel}</span>}
              <div className="price">{fmtIDR(p.hargaFinal)}</div>
              <div className="tiny dim mt-sm" style={{fontFamily:'var(--mono)',letterSpacing:'.1em'}}>Stok {p.stock}</div>
            </div>
          ))}
          {visible.length===0 && <div className="muted" style={{padding:40,gridColumn:'1/-1',textAlign:'center',background:'var(--maroon)'}}>Tidak ada produk yang cocok.</div>}
        </div>

        <div className="mt-lg">
          <div className="sec-mark"><span className="label">Hari ini</span><span className="line"/></div>
          <table className="tbl mt-md">
            <thead><tr><th>Waktu</th><th>Channel</th><th>Customer</th><th>Items</th><th>Total</th><th></th></tr></thead>
            <tbody>
              {state.orders.filter(o=>o.date===todayISO()).slice(0,10).map(o=>(
                <tr key={o.id} className="clickable" onClick={()=>setLastOrder(o)}>
                  <td className="mono dim">{o.time}</td>
                  <td><span className="pill">{o.channel}</span></td>
                  <td className="dim">{o.customer}</td>
                  <td className="dim">{o.items.length} item</td>
                  <td className="mono" style={{color:'var(--accent)'}}>{fmtIDR(o.total)}</td>
                  <td><button className="btn sm ghost icon" onClick={e=>{e.stopPropagation();setLastOrder(o);}}><I name="print" size={12}/></button></td>
                </tr>
              ))}
              {state.orders.filter(o=>o.date===todayISO()).length===0 && <tr><td colSpan={6} className="muted" style={{textAlign:'center',padding:24}}>Belum ada order hari ini.</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      <aside className={"pos-cart "+(cartOpen?'open':'')}>
        <div className="pos-cart-h">
          <div className="row" style={{justifyContent:'space-between'}}>
            <div>
              <div className="label">N° 01 — {t('open_pos')}</div>
              <h3 style={{fontSize:22,margin:'6px 0 0'}}>Cart</h3>
            </div>
            <div style={{textAlign:'right'}}>
              <div className="mono" style={{color:'var(--accent)',fontSize:18,fontWeight:600}}>{cart.length>0 ? fmtIDR(subtotal) : '—'}</div>
              <button className="btn sm ghost no-print" style={{marginTop:6,display:'none'}} onClick={()=>setCartOpen(false)} aria-label="close cart">
                <I name="close" size={12}/>
              </button>
            </div>
          </div>
        </div>
        <div className="pos-cart-items">
          {cart.length===0 ? <div className="muted" style={{textAlign:'center',padding:40}}>{t('cart_empty')}</div> :
            cart.map(c=>(
              <div key={c.productId} className="cart-row">
                <div>
                  <div className="bright" style={{fontFamily:'var(--display)',fontSize:17}}>{c.name}</div>
                  <div className="tiny mono dim mt-sm">{fmtIDR(c.price)} × {c.qty}</div>
                </div>
                <div className="col" style={{alignItems:'flex-end',gap:6}}>
                  <div className="qty">
                    <button onClick={()=>setQty(c.productId, c.qty-1)}>−</button>
                    <span>{c.qty}</span>
                    <button onClick={()=>setQty(c.productId, c.qty+1)}>+</button>
                  </div>
                  <div className="mono" style={{color:'var(--accent)',fontWeight:600}}>{fmtIDR(c.price*c.qty)}</div>
                </div>
              </div>
            ))
          }
        </div>
        <div className="pos-cart-foot">
          <div className="field"><label>{t('customer_optional')}</label><input className="input" value={customer} onChange={e=>setCustomer(e.target.value)} placeholder={t('customer_ph')}/></div>
          <div className="row" style={{justifyContent:'space-between',margin:'18px 0 4px'}}>
            <span className="label">{t('subtotal')}</span>
            <span className="mono dim">{fmtIDR(subtotal)}</span>
          </div>
          <div className="row" style={{justifyContent:'space-between',marginBottom:18}}>
            <span className="label">{t('total')}</span>
            <span style={{fontSize:28,color:'var(--accent)',fontFamily:'var(--display)',fontWeight:600}}>{fmtIDR(subtotal)}</span>
          </div>
          <button className="btn primary" style={{width:'100%',justifyContent:'center',padding:'16px'}} onClick={()=>{setCartOpen(false); checkout();}} disabled={cart.length===0}>
            <I name="check" size={13}/>{t('checkout')}
          </button>
        </div>
      </aside>
    </div>

    {/* Mobile floating cart button */}
    {cart.length > 0 && !cartOpen && (
      <button className="cart-fab no-print" onClick={()=>setCartOpen(true)}>
        <I name="pos" size={14}/>
        <span className="badge">{cart.reduce((s,c)=>s+c.qty,0)}</span>
        <span>{fmtIDR(subtotal)}</span>
      </button>
    )}
    {cartOpen && <div className="cart-backdrop show no-print" onClick={()=>setCartOpen(false)}/>}

    {paymentOpen && (
      <PaymentModal total={subtotal} onPay={completeOrder} onClose={()=>setPaymentOpen(false)}/>
    )}
    {lastOrder && (
      <ReceiptModal order={lastOrder} settings={state.settings} onClose={()=>setLastOrder(null)}/>
    )}
    </>
  );
}

   REPORTS MODULE
   ============================================================ */
function ReportsModule(){
  const { state, toast, t, lang } = useApp();
  const [range,setRange] = useState('30d');
  const [exporting,setExporting] = useState(false);

  async function doExport(){
    setExporting(true);
    try{
      await exportRevenueXLSX(state, range, t, lang);
      toast(t('excel_export_done'), 'ok');
    }catch(e){
      toast(t('excel_export_fail')+': '+e.message, 'err');
    } finally { setExporting(false); }
  }

  const today = new Date(todayISO());
  const cutoff = new Date(today);
  if(range==='7d') cutoff.setDate(today.getDate()-6);
  if(range==='30d') cutoff.setDate(today.getDate()-29);
  if(range==='90d') cutoff.setDate(today.getDate()-89);
  if(range==='ytd') cutoff.setMonth(0,1);
  if(range==='all') cutoff.setFullYear(2000);

  const inRange = state.orders.filter(o=> new Date(o.date) >= cutoff);
  const total = inRange.reduce((s,o)=>s+o.total,0);
  const count = inRange.length;
  const avg = count? total/count : 0;
  const items = inRange.flatMap(o=>o.items);
  const totalQty = items.reduce((s,i)=>s+i.qty,0);

  const daily = {};
  for(const o of inRange){ daily[o.date] = (daily[o.date]||0) + o.total; }
  const days = Object.keys(daily).sort();
  const perProduct = {};
  for(const it of items){ perProduct[it.name] = (perProduct[it.name]||0) + it.qty*it.price; }
  const topProd = Object.entries(perProduct).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const perChannel = {};
  for(const o of inRange){ perChannel[o.channel] = (perChannel[o.channel]||0) + o.total; }
  const monthly={};
  for(const o of state.orders){ const m=o.date.slice(0,7); monthly[m]=(monthly[m]||0)+o.total; }
  const months = Object.keys(monthly).sort();

  const chart1 = useRef(null), chart2 = useRef(null), chart3 = useRef(null);
  useEffect(()=>{
    const opts = {
      responsive:true,maintainAspectRatio:false,
      animation:{duration:600, easing:'easeOutQuart'},
      plugins:{legend:{labels:{color:'#3d2d20',font:{family:'Inter',size:11}}}},
      scales:{x:{ticks:{color:'#7a6a55',font:{family:'JetBrains Mono'}},grid:{color:'rgba(10,6,6,.08)'}},
              y:{ticks:{color:'#7a6a55',font:{family:'JetBrains Mono'}},grid:{color:'rgba(10,6,6,.08)'}}}
    };
    const c1 = new Chart(chart1.current,{
      type:'line',
      data:{ labels: days.map(d=>d.slice(5)), datasets:[{
        label:t('revenue'), data: days.map(d=>daily[d]),
        borderColor:'#5a0f1a', backgroundColor:'rgba(90,15,26,.10)', tension:.35, fill:true, pointRadius:2, borderWidth:2,
        pointBackgroundColor:'#5a0f1a'
      }]},
      options:{...opts, scales:{...opts.scales, y:{...opts.scales.y, ticks:{...opts.scales.y.ticks, callback:v=>(v/1000)+'k'}}}}
    });
    const c2 = new Chart(chart2.current,{
      type:'doughnut',
      data:{ labels: Object.keys(perChannel), datasets:[{
        data: Object.values(perChannel),
        backgroundColor:['#5a0f1a','#c9a961','#7a1a26','#b8965a','#3d0810'],
        borderColor:'#f5efe6', borderWidth:2
      }]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'right',labels:{color:'#3d2d20',font:{family:'Inter',size:11},usePointStyle:true}}},
        cutout:'68%' }
    });
    const c3 = new Chart(chart3.current,{
      type:'bar',
      data:{ labels: months, datasets:[{
        label:t('revenue_monthly'), data: months.map(m=>monthly[m]),
        backgroundColor:'rgba(90,15,26,.7)', borderColor:'#5a0f1a', borderWidth:1, borderRadius:0
      }]},
      options:{...opts, plugins:{...opts.plugins, legend:{display:false}},
        scales:{...opts.scales, y:{...opts.scales.y, ticks:{...opts.scales.y.ticks, callback:v=>(v/1000000).toFixed(1)+'M'}}}}
    });
    return ()=>{c1.destroy();c2.destroy();c3.destroy();};
  },[range,state.orders,t]);

  const monthly_now = monthly[todayISO().slice(0,7)] || 0;
  const yearly_now = months.filter(m=>m.startsWith(todayISO().slice(0,4))).reduce((s,m)=>s+monthly[m],0);

  return (
    <div className="col gap-lg">
      <div className="row" style={{padding:'8px 0',borderBottom:'1px solid var(--border)',flexWrap:'wrap'}}>
        {[['7d',t('range_7d')],['30d',t('range_30d')],['90d',t('range_90d')],['ytd',t('range_ytd')],['all',t('range_all')]].map(([k,l])=>(
          <button key={k} className={"btn "+(range===k?'primary':'ghost')} onClick={()=>setRange(k)}>{l}</button>
        ))}
        <div style={{flex:1}}/>
        <button className="btn" onClick={()=>window.print()}><I name="print" size={12}/>{t('print')}</button>
        <button className="btn gold" onClick={doExport} disabled={exporting}>
          <I name="download" size={12}/>{exporting? t('chart_loading') : t('export_excel')}
        </button>
      </div>

      <div className="kpis">
        <div className="kpi">
          <div className="lab">{t('revenue')}</div>
          <div className="val">{fmtIDR(total)}</div>
          <div className="sub">{count} {t('kpi_order')} · {t('avg')} {fmtIDR(avg)}</div>
        </div>
        <div className="kpi">
          <div className="lab">{t('items_sold')}</div>
          <div className="val">{totalQty}</div>
          <div className="sub">{Object.keys(perProduct).length} SKU</div>
        </div>
        <div className="kpi">
          <div className="lab">{t('monthly_target')}</div>
          <div className="val">{((monthly_now/state.settings.monthlyTarget)*100).toFixed(0)}%</div>
          <div className="sub">{fmtIDR(monthly_now)} / {fmtIDR(state.settings.monthlyTarget)}</div>
        </div>
        <div className="kpi">
          <div className="lab">{t('yearly_target')}</div>
          <div className="val">{((yearly_now/state.settings.yearlyTarget)*100).toFixed(0)}%</div>
          <div className="sub">{fmtIDR(yearly_now)} / {fmtIDR(state.settings.yearlyTarget)}</div>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 02 — {t('trend')}</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>{t('revenue_daily')}</h3>
        <div className="curve-wrap" style={{height:300}}><canvas ref={chart1}/></div>
      </div>

      <div className="grid-2">
        <div>
          <div className="sec-mark"><span className="label">{t('distribution')}</span><span className="line"/></div>
          <h3 style={{fontSize:24,margin:'10px 0 20px'}}>{t('per_channel')}</h3>
          <div className="curve-wrap" style={{height:280}}><canvas ref={chart2}/></div>
        </div>
        <div>
          <div className="sec-mark"><span className="label">{t('top5')}</span><span className="line"/></div>
          <h3 style={{fontSize:24,margin:'10px 0 20px'}}>{t('best_sellers')}</h3>
          <div className="col">
            {topProd.map(([name,val],i)=>(
              <div key={name} style={{padding:'14px 0',borderBottom:'1px solid var(--border)'}}>
                <div className="row" style={{justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div className="mono tiny dim">N° {String(i+1).padStart(2,'0')}</div>
                    <div className="bright" style={{fontFamily:'var(--display)',fontSize:18,marginTop:2}}>{name}</div>
                  </div>
                  <span className="mono" style={{color:'var(--accent)'}}>{fmtIDR(val)}</span>
                </div>
                <div className="progress mt-sm"><div style={{width:(val/topProd[0][1]*100)+'%'}}/></div>
              </div>
            ))}
            {topProd.length===0 && <div className="muted">{t('no_sales')}</div>}
          </div>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 03 — {t('nav_reports')}</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>{t('revenue_monthly')}</h3>
        <div className="curve-wrap" style={{height:280}}><canvas ref={chart3}/></div>
      </div>
    </div>
  );
}

/* ============================================================
   SETTINGS MODULE
   ============================================================ */
function SettingsModule(){
  const { state, update, toast, manualSync, triggerInstall, installAvailable, printerConnected, t, currentUser } = useApp();
  const [s,setS] = useState({...state.settings});
  const [testing,setTesting] = useState(false);
  const [connecting,setConnecting] = useState(false);
  const [printerName,setPrinterName] = useState(printerSingleton.lastName||'');
  const printerStatus = connecting ? 'connecting' : (printerConnected ? 'connected' : 'idle');
  function set(k,v){ setS(st=>({...st,[k]:v})); }
  function save(){ update({settings:s}); toast('Settings disimpan','ok'); }

  async function testSync(){
    setTesting(true);
    try{
      const r = await SyncSvc.test(s.syncEndpoint, s.syncSecret);
      toast('Connected · v'+(r.version||'?')+' · '+(r.time||''),'ok');
    }catch(err){
      toast('Test gagal: '+err.message,'err');
    } finally { setTesting(false); }
  }
  async function pushNow(){
    if(!s.syncEndpoint || !s.syncSecret){ toast('Isi endpoint & secret dulu','warn'); return; }
    // Auto-enable sync after first successful manual push
    const willEnable = !s.syncEnabled;
    update({settings:{...s, syncEnabled:true}});
    try{
      const merged = await SyncSvc.push(s.syncEndpoint, s.syncSecret, {...state, settings: s});
      toast(willEnable? 'Sync diaktifkan + push berhasil.' : 'Push berhasil ke spreadsheet.','ok');
    }catch(err){ toast('Push gagal: '+err.message,'err'); }
  }

  async function connectPrinter(){
    setConnecting(true);
    try{
      const info = await printerSingleton.connect();
      setPrinterName(info.name);
      set('printerName', info.name);
      toast('Printer terkoneksi: '+info.name,'ok');
    }catch(err){
      toast('Connect gagal: '+err.message,'err');
    } finally { setConnecting(false); }
  }
  async function disconnectPrinter(){
    await printerSingleton.disconnect();
    setPrinterName('');
    toast('Printer di-disconnect','ok');
  }
  async function testPrint(){
    if(!printerSingleton.connected){ toast('Printer belum terkoneksi','warn'); return; }
    try{
      await printerSingleton.send(buildTestPrintBytes(s, s.printerWidth||32));
      toast('Test print terkirim','ok');
    }catch(err){ toast('Test print gagal: '+err.message,'err'); }
  }

  function copyToClipboard(text){
    navigator.clipboard?.writeText(text);
    toast('Tersalin ke clipboard','ok');
  }
  const webhookURL = s.syncEndpoint
    ? `${s.syncEndpoint}${s.syncEndpoint.includes('?')?'&':'?'}action=webhook&secret=${encodeURIComponent(s.syncSecret||'YOUR_SECRET')}`
    : '';
  function exportData(){
    const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `taring-naga-lab-backup-${todayISO()}.json`;
    a.click();
  }
  function importData(e){
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      try{
        const data = JSON.parse(r.result);
        if(!confirm('Restore akan menimpa data saat ini. Lanjut?')) return;
        localStorage.setItem(STORE_KEY, JSON.stringify(data));
        location.reload();
      }catch(err){ toast('File tidak valid','err'); }
    };
    r.readAsText(f);
  }
  function reset(){
    if(!confirm('Reset ke data demo? Semua perubahan akan hilang.')) return;
    localStorage.removeItem(STORE_KEY);
    location.reload();
  }

  return (
    <div className="col gap-lg">
      <div>
        <div className="sec-mark"><span className="label">N° 00 — {t('language')}</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(22px, 2.4vw, 30px)',margin:'10px 0 18px'}}>{t('language')}</h3>
        <div className="row" style={{gap:0}}>
          <button className={"btn "+(s.language==='id'?'primary':'ghost')} onClick={()=>{ set('language','id'); update({settings:{...state.settings,language:'id'}}); }}>
            🇮🇩 {t('language_id')}
          </button>
          <button className={"btn "+(s.language==='en'?'primary':'ghost')} onClick={()=>{ set('language','en'); update({settings:{...state.settings,language:'en'}}); }}>
            🇬🇧 {t('language_en')}
          </button>
        </div>
      </div>

      {/* BRANDING — admin/owner only with canEditBranding */}
      {(currentUser?.role === 'admin' || getPerms(state.settings, currentUser?.role).canEditBranding) && (
        <BrandingSection s={s} set={set} update={update} state={state} t={t} toast={toast}/>
      )}

      {/* THEME — palette + density + sidebar pos */}
      <ThemeSection s={s} set={set} update={update} state={state} t={t}/>

      {/* RECEIPT custom */}
      <ReceiptSection s={s} set={set} update={update} state={state} t={t} toast={toast}/>

      {/* SETTLEMENT settings */}
      <SettlementSettingsSection s={s} set={set} t={t}/>

      <div>
        <div className="sec-mark"><span className="label">N° 01 — {t('business_info')}</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>{t('business_info')}</h3>
        <div className="grid-2">
          <div className="field"><label>Nama Bisnis</label><input className="input" value={s.businessName} onChange={e=>set('businessName',e.target.value)}/></div>
          <div className="field"><label>Tagline</label><input className="input" value={s.tagline} onChange={e=>set('tagline',e.target.value)}/></div>
          <div className="field"><label>Alamat</label><input className="input" value={s.address} onChange={e=>set('address',e.target.value)}/></div>
          <div className="field"><label>Telepon / WA</label><input className="input" value={s.phone} onChange={e=>set('phone',e.target.value)}/></div>
          <div className="field"><label>WA Group (Notifikasi)</label><input className="input" value={s.waGroup} onChange={e=>set('waGroup',e.target.value)}/></div>
          <div className="field"><label>Low Stock Threshold</label><input className="input mono" type="number" value={s.lowStockThreshold} onChange={e=>set('lowStockThreshold',+e.target.value)}/></div>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 02 — Pricing</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>Parameter <em>harga</em></h3>
        <div className="grid-3">
          <div className="field"><label>Markup %</label><input className="input mono" type="number" value={s.markupPct} onChange={e=>set('markupPct',+e.target.value)}/></div>
          <div className="field"><label>Susut Default</label><input className="input mono" type="number" step="0.01" value={s.susutDefault} onChange={e=>set('susutDefault',+e.target.value)}/></div>
          <div className="field"><label>Packaging (Rp)</label><input className="input mono" type="number" value={s.packagingCost} onChange={e=>set('packagingCost',+e.target.value)}/></div>
          <div className="field"><label>Sticker (Rp)</label><input className="input mono" type="number" value={s.stickerCost} onChange={e=>set('stickerCost',+e.target.value)}/></div>
          <div className="field"><label>Jasa Roasting (Rp)</label><input className="input mono" type="number" value={s.roastingFee} onChange={e=>set('roastingFee',+e.target.value)}/></div>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 03 — Target</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>Pencapaian</h3>
        <div className="grid-2">
          <div className="field"><label>Target Bulanan (Rp)</label><input className="input mono" type="number" value={s.monthlyTarget} onChange={e=>set('monthlyTarget',+e.target.value)}/></div>
          <div className="field"><label>Target Tahunan (Rp)</label><input className="input mono" type="number" value={s.yearlyTarget} onChange={e=>set('yearlyTarget',+e.target.value)}/></div>
        </div>
      </div>

      <div className="row" style={{justifyContent:'flex-end'}}>
        <button className="btn primary" onClick={save}><I name="check" size={12}/>Simpan Settings</button>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 04 — PWA</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>Install ke <em>Home Screen</em></h3>
        <div className="grid-2">
          <div>
            <div className="dim" style={{lineHeight:1.7,maxWidth:560}}>
              Pasang app ini ke home screen iOS/Android. Buka offline, akses cepat seperti app native.
              <br/><br/>
              <span className="label" style={{display:'block',marginBottom:4}}>iOS Safari</span>
              Share <I name="upload" size={11}/> → "Add to Home Screen"
              <br/>
              <span className="label" style={{display:'block',margin:'8px 0 4px'}}>Android Chrome</span>
              Menu ⋮ → "Install app" atau "Add to Home Screen"
              <br/>
              <span className="label" style={{display:'block',margin:'8px 0 4px'}}>Desktop Chrome/Edge</span>
              Klik icon install di address bar
            </div>
          </div>
          <div className="row" style={{justifyContent:'flex-end',alignItems:'flex-start'}}>
            <button className="btn primary" onClick={triggerInstall} disabled={!installAvailable}>
              <I name="download" size={12}/>{installAvailable? 'Install Sekarang' : 'Install via menu browser'}
            </button>
          </div>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 05 — Sync & Database</span><span className="line"/></div>
        <div className="row" style={{justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
          <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 0'}}>Google Spreadsheet · <em>multi-device</em></h3>
          <Toggle
            on={!!s.syncEnabled}
            disabled={!s.syncEndpoint || !s.syncSecret}
            onChange={v => { set('syncEnabled', v); update({settings:{...state.settings, syncEnabled:v}}); }}
            label={s.syncEnabled ? 'AKTIF' : 'MATI'}
          />
        </div>
        <div className="dim" style={{lineHeight:1.7,maxWidth:680,marginBottom:18,marginTop:8}}>
          Master switch sync. <em>Mati = data hanya lokal</em>. Aktifkan setelah isi URL & secret + Test berhasil.
        </div>
        <div className="grid-2">
          <div className="field"><label>Apps Script Web App URL</label>
            <input className="input mono" value={s.syncEndpoint} onChange={e=>set('syncEndpoint',e.target.value)} placeholder="https://script.google.com/macros/s/.../exec"/>
          </div>
          <div className="field"><label>Shared Secret</label>
            <input className="input mono" type="password" value={s.syncSecret} onChange={e=>set('syncSecret',e.target.value)} placeholder="String acak panjang"/>
          </div>
          <div className="field" style={{gridColumn:'1/-1'}}>
            <label>Auto-sync Interval</label>
            <IntervalPicker
              value={s.syncInterval}
              onChange={v => set('syncInterval', v)}
              presets={[
                {label:'15s', v:15},
                {label:'30s', v:30},
                {label:'1m',  v:60},
                {label:'5m',  v:300},
                {label:'15m', v:900},
                {label:'1h',  v:3600},
              ]}
              min={5}
              max={86400}
              disabled={!s.syncEnabled}
            />
          </div>
          <div className="field" style={{gridColumn:'1/-1'}}><label>Status</label>
            <div className="row mt-sm" style={{flexWrap:'wrap',gap:14}}>
              <span className="pill" style={{borderColor: !s.syncEnabled ? 'var(--border-2)' : SyncSvc.status==='error'?'var(--danger)':'var(--ok)', color: !s.syncEnabled ? 'var(--text-3)' : SyncSvc.status==='error'?'var(--danger)':'var(--ok)'}}>
                {!s.syncEnabled ? 'OFF' : SyncSvc.status==='syncing'?'Syncing…':SyncSvc.status==='error'?'Error':'Idle'}
              </span>
              {s.syncEnabled && SyncSvc.lastSyncAt && <span className="tiny dim">Sync terakhir: {new Date(SyncSvc.lastSyncAt).toLocaleString('id-ID')}</span>}
              {s.syncEnabled && s.syncInterval>=5 && <span className="tiny dim">Next: tiap {fmtInterval(s.syncInterval)}</span>}
            </div>
          </div>
        </div>
        {SyncSvc.lastError && <div className="tiny" style={{color:'var(--danger)',marginTop:10,padding:'10px 14px',border:'1px solid rgba(161,62,44,.3)',background:'rgba(161,62,44,.06)',borderRadius:2}}>
          <strong>Error:</strong> {SyncSvc.lastError}
          <div style={{marginTop:6,opacity:.85}}>Cek: URL benar (akhiran /exec), secret sama persis dengan Apps Script, Apps Script ter-deploy "Anyone with the link".</div>
        </div>}
        <div className="row mt-md" style={{flexWrap:'wrap',gap:10}}>
          <button className="btn" onClick={testSync} disabled={testing || !s.syncEndpoint}><I name="check" size={12}/>{testing?'Testing…':'Test Connection'}</button>
          <button className="btn primary" onClick={pushNow} disabled={!s.syncEndpoint || !s.syncSecret}><I name="upload" size={12}/>Force Sync Now</button>
          <div style={{flex:1}}/>
          <span className="tiny dim">Conflict resolution: last-write-wins per item ID</span>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 06 — Webhook (Web → POS)</span><span className="line"/></div>
        <div className="row" style={{justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
          <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 0'}}>Auto-import order <em>taringnaga.id</em></h3>
          <Toggle
            on={!!s.webhookEnabled}
            disabled={!s.syncEndpoint || !s.syncSecret}
            onChange={v => { set('webhookEnabled', v); update({settings:{...state.settings, webhookEnabled:v}}); }}
            label={s.webhookEnabled ? 'AKTIF' : 'MATI'}
          />
        </div>
        <div className="dim" style={{lineHeight:1.7,maxWidth:680,marginBottom:18,marginTop:8}}>
          Order dari website otomatis masuk ke POS. <em>Mati = order web tidak ditarik</em>.
          App polling setiap interval untuk pull order baru, lalu auto-print kalau printer terhubung.
        </div>
        <div className="grid-2">
          <div className="field" style={{gridColumn:'span 2'}}><label>Webhook URL (paste ke taringnaga.id)</label>
            <div className="row" style={{gap:8}}>
              <input className="input mono" readOnly value={webhookURL} placeholder="Isi endpoint + secret dulu" style={{flex:1,fontSize:12}}/>
              <button className="btn" onClick={()=>copyToClipboard(webhookURL)} disabled={!webhookURL}><I name="upload" size={12}/>Copy</button>
            </div>
          </div>
          <div className="field" style={{gridColumn:'1/-1'}}>
            <label>Poll Interval</label>
            <IntervalPicker
              value={s.webhookPollInterval}
              onChange={v => set('webhookPollInterval', v)}
              presets={[
                {label:'10s', v:10},
                {label:'30s', v:30},
                {label:'1m',  v:60},
                {label:'2m',  v:120},
                {label:'5m',  v:300},
              ]}
              min={5}
              max={3600}
              disabled={!s.webhookEnabled}
            />
          </div>
          <div className="field" style={{gridColumn:'1/-1'}}><label>Format payload</label>
            <textarea className="input mono" readOnly style={{minHeight:90,fontSize:11,whiteSpace:'pre',overflow:'auto'}} value={'{ "order": {\n  "items": [{ "name":"Kawi 200g", "price":60000, "qty":1 }],\n  "customer":"Budi · +62812",\n  "total":60000,\n  "channel":"Web",\n  "note":"Kirim siang"\n}}'}/>
          </div>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 07 — Thermal Printer</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 16px'}}>Print struk via <em>Bluetooth</em></h3>
        <div className="dim" style={{lineHeight:1.7,maxWidth:680,marginBottom:18}}>
          Native ESC/POS Bluetooth — Bixolon, Eppos, Xprinter, atau generic 58mm/80mm.
          Chrome/Edge desktop &amp; Chrome Android support; Safari iOS fallback ke browser print.
        </div>
        <div className="grid-2">
          <div className="field"><label>Status</label>
            <div className="row mt-sm">
              <span className="pill" style={{borderColor: printerStatus==='connected'?'rgba(94,138,78,.5)':'var(--border-2)', color: printerStatus==='connected'?'var(--ok)':'var(--text-2)'}}>
                {printerStatus==='connecting'?'Connecting…':printerStatus==='connected'?'Connected':'Disconnected'}
              </span>
              {printerName && <span className="dim tiny">{printerName}</span>}
            </div>
          </div>
          <div className="field"><label>Paper Width</label>
            <select className="select" value={s.printerWidth} onChange={e=>set('printerWidth',+e.target.value)}>
              <option value={32}>58mm (32 karakter)</option>
              <option value={48}>80mm (48 karakter)</option>
            </select>
          </div>
          <div className="field" style={{gridColumn:'span 2'}}>
            <label>Auto Print di Checkout</label>
            <label className="checkbox" style={{marginTop:8}}>
              <input type="checkbox" checked={s.printerAutoPrint} onChange={e=>set('printerAutoPrint',e.target.checked)}/>
              Otomatis print struk saat order selesai (POS &amp; web order masuk)
            </label>
          </div>
        </div>
        <div className="row mt-md">
          {!printerSingleton.connected ? (
            <button className="btn primary" onClick={connectPrinter}><I name="print" size={12}/>Connect Printer</button>
          ) : (
            <>
              <button className="btn" onClick={disconnectPrinter}>Disconnect</button>
              <button className="btn primary" onClick={testPrint}><I name="print" size={12}/>Test Print</button>
            </>
          )}
          <div style={{flex:1}}/>
          <span className="tiny dim">Wajib HTTPS untuk Web Bluetooth</span>
        </div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 08 — Data</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(26px, 3vw, 36px)',margin:'10px 0 24px'}}>Backup & <em>Restore</em></h3>
        <div className="row">
          <button className="btn" onClick={exportData}><I name="download" size={12}/>Export JSON</button>
          <label className="btn">
            <I name="upload" size={12}/>Import
            <input type="file" accept="application/json" onChange={importData} style={{display:'none'}}/>
          </label>
          <div style={{flex:1}}/>
          <button className="btn danger" onClick={reset}><I name="trash" size={12}/>Reset ke Demo</button>
        </div>
        <div className="tiny dim mt-md" style={{lineHeight:1.6,maxWidth:560}}>Data tersimpan lokal di browser (localStorage). Integrasi server REST/Firebase bisa ditambahkan untuk sync multi-device.</div>
      </div>

      <div>
        <div className="sec-mark"><span className="label">N° 09 — Tentang</span><span className="line"/></div>
        <h3 style={{fontSize:'clamp(28px, 3.5vw, 42px)',margin:'10px 0 14px'}}>Taring Naga <em>Lab</em> v1.0</h3>
        <div className="hero-quote" style={{borderLeft:'1px solid var(--gold)',paddingLeft:18,maxWidth:560}}>Slow-roasted. Naturally rooted. <em>Coffee with a bite.</em></div>
        <div className="dim mt-md" style={{maxWidth:600,lineHeight:1.7}}>Operations Suite untuk roastery — Roast Log, Inventory & Pricing, P.O.S, dan Pembukuan. PWA installable, sync via Google Spreadsheet, webhook untuk integrasi web order, dan native ESC/POS Bluetooth printer. Siap dijual sebagai produk turnkey untuk roaster Indonesia.</div>
      </div>
    </div>
  );
}

/* ============================================================
   MOUNT
   ============================================================ */
// Global error logging
window.addEventListener('error', (e)=>{
  console.error('[TN Lab] window error:', e.error || e.message);
});
window.addEventListener('unhandledrejection', (e)=>{
  console.error('[TN Lab] unhandled promise:', e.reason);
});

ReactDOM.createRoot(document.getElementById('root')).render(
  <ErrorBoundary>
    <App/>
  </ErrorBoundary>
);
</script>
</body>
</html>
